*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC','SimSun',serif;background:#d8c8a8;color:#3d2810;overflow:hidden;height:100vh}
.main-container{display:flex;height:100vh}
.canvas-area{flex:1;position:relative;background:#d8c8a8;min-width:0;min-height:0;padding-bottom:60px}
#mapCanvas{display:block;width:100%;height:100%;cursor:crosshair}
.info-panel{width:380px;min-width:380px;background:#e8d5b7;border-left:2px solid #5c3d1f;overflow-y:auto;display:flex;flex-direction:column}
.control-bar{position:absolute;top:0;left:0;right:380px;background:rgba(232,213,183,.92);border-bottom:1px solid #5c3d1f;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.control-bar h1{font-size:1em;color:#5c3d1f;letter-spacing:4px;font-weight:700}
.view-tabs{display:flex;gap:0}
.view-tab{padding:8px 20px;border:1px solid #8b6540;background:rgba(160,120,60,.15);color:#5c3d1f;font-family:inherit;font-size:.85em;cursor:pointer;transition:all .2s}
.view-tab:first-child{border-radius:4px 0 0 4px}
.view-tab:last-child{border-radius:0 4px 4px 0}
.view-tab.active{background:#8b6540;color:#e8d5b7;border-color:#8b6540}
.view-tab:hover:not(.active){background:rgba(139,101,64,.3)}
.panel-header{padding:20px;border-bottom:1px solid #5c3d1f;background:rgba(160,120,60,.08)}
.panel-header h2{color:#5c3d1f;font-size:1.2em;margin-bottom:5px;font-weight:700}
.panel-header .subtitle{font-size:.8em;color:#8b6540}
.panel-content{padding:20px;flex:1;overflow-y:auto}
.panel-section{margin-bottom:20px}
.panel-section h3{color:#5c3d1f;font-size:.9em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(92,61,31,.25)}
.panel-section p{font-size:.85em;line-height:1.8;color:#3d2810}
.panel-section .quote{font-style:italic;color:#5c3d1f;border-left:3px solid #5c3d1f;padding-left:12px;margin:10px 0;font-size:.85em;background:rgba(92,61,31,.05);padding:8px 12px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tag{padding:4px 10px;border-radius:2px;font-size:.75em}
.tag-capital{background:rgba(194,58,42,.15);color:#c23a2a;border:1px solid #c23a2a}
.tag-military{background:rgba(194,58,42,.1);color:#b8342a;border:1px solid #b8342a}
.tag-economic{background:rgba(90,138,106,.15);color:#5a8a6a;border:1px solid #5a8a6a}
.tag-cultural{background:rgba(58,107,124,.15);color:#3a6b7c;border:1px solid #3a6b7c}
.tag-border{background:rgba(139,101,64,.15);color:#8b6540;border:1px solid #8b6540}
.tag-residence{background:rgba(160,120,60,.15);color:#8b6540;border:1px solid #8b6540}
.tag-market{background:rgba(58,107,124,.1);color:#3a6b7c;border:1px solid #3a6b7c}
.tag-craft{background:rgba(139,101,64,.1);color:#8b6540;border:1px solid #8b6540}
.empty-state{text-align:center;padding:60px 20px;color:#8b6540}
.empty-state p{margin:8px 0}
.legend{position:absolute;bottom:80px;left:20px;background:rgba(232,213,183,.95);border:1px solid #5c3d1f;border-radius:2px;padding:12px 16px;z-index:10;max-width:200px}
.legend-title{font-size:.8em;color:#5c3d1f;margin-bottom:8px;font-weight:700}
.legend-item{display:flex;align-items:center;margin:4px 0;font-size:.75em;color:#5c3d1f}
.legend-dot{width:10px;height:10px;margin-right:8px;flex-shrink:0}
.zoom-controls{position:absolute;bottom:80px;right:20px;display:flex;flex-direction:column;gap:5px;z-index:10}
.zoom-btn{width:36px;height:36px;border:1px solid #5c3d1f;background:rgba(232,213,183,.95);color:#5c3d1f;font-size:1.2em;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.zoom-btn:hover{background:rgba(139,101,64,.3)}
.btn-link{display:inline-block;padding:10px 20px;background:#8b6540;color:#e8d5b7;border:none;border-radius:2px;font-family:inherit;font-size:.9em;cursor:pointer;text-decoration:none;margin-top:10px;letter-spacing:1px}
.btn-link:hover{background:#5c3d1f}
.btn-back{display:inline-block;padding:8px 16px;background:rgba(139,101,64,.2);border:1px solid #8b6540;color:#5c3d1f;border-radius:2px;font-family:inherit;font-size:.85em;cursor:pointer;margin-top:10px}
.btn-back:hover{background:rgba(139,101,64,.35)}
.county-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.county-tag{padding:3px 8px;background:rgba(139,101,64,.12);border:1px solid rgba(92,61,31,.3);border-radius:2px;font-size:.78em;color:#5c3d1f}

/* ===== 时间轴 ===== */
.timeline-container{position:absolute;bottom:0;left:0;right:380px;height:60px;background:rgba(232,213,183,.92);border-top:2px solid #5c3d1f;z-index:15;display:flex;align-items:center;padding:0 20px;gap:10px}
.timeline-btn{width:32px;height:32px;border:1px solid #8b6540;background:rgba(160,120,60,.15);color:#5c3d1f;font-family:inherit;font-size:1em;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.timeline-btn:hover{background:rgba(139,101,64,.3)}
.timeline-phases{display:flex;align-items:center;gap:0;flex:1;justify-content:center}
.phase-item{display:flex;align-items:center}
.phase-btn{padding:7px 18px;border:1px solid #8b6540;background:rgba(160,120,60,.15);color:#5c3d1f;font-family:inherit;font-size:.82em;cursor:pointer;transition:all .25s;white-space:nowrap;letter-spacing:1px}
.phase-btn:first-child{border-radius:2px 0 0 2px}
.phase-btn:last-child{border-radius:0 2px 2px 0}
.phase-btn.active{background:#8b6540;color:#e8d5b7;border-color:#8b6540;box-shadow:inset 0 0 8px rgba(0,0,0,.15)}
.phase-btn:hover:not(.active){background:rgba(139,101,64,.25)}
.phase-separator{width:20px;height:0;border-top:1px dashed #8b6540;opacity:.6}
.timeline-desc{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);background:rgba(232,213,183,.95);border:1px solid #5c3d1f;border-radius:2px;padding:6px 14px;font-size:.78em;color:#5c3d1f;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s}
.timeline-container:hover .timeline-desc{opacity:1}

/* ===== 迷你地图 ===== */
.minimap-wrap{position:absolute;bottom:70px;right:15px;width:180px;height:120px;background:rgba(232,213,183,.9);border:1px solid #5c3d1f;border-radius:2px;z-index:12;padding:4px;cursor:pointer}
.minimap-title{position:absolute;top:-18px;right:0;font-size:.72em;color:#5c3d1f;letter-spacing:1px;background:rgba(232,213,183,.9);padding:2px 6px;border:1px solid #5c3d1f;border-bottom:none;border-radius:2px 2px 0 0}
#minimapCanvas{display:block;width:100%;height:100%}

/* ===== 信息面板标签页 ===== */
.panel-tabs{display:flex;border-bottom:1px solid rgba(92,61,31,.25);margin-bottom:0}
.panel-tab{padding:8px 16px;border:none;background:transparent;color:#8b6540;font-family:inherit;font-size:.82em;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.panel-tab.active{color:#5c3d1f;border-bottom-color:#5c3d1f;font-weight:700}
.panel-tab:hover:not(.active){color:#5c3d1f}

/* 解锁提示 */
.unlock-hint{position:absolute;pointer-events:none;background:rgba(232,213,183,.95);border:1px solid #d4a853;color:#5c3d1f;padding:4px 10px;font-size:.75em;border-radius:2px;white-space:nowrap;z-index:20;opacity:0;transition:opacity .25s}
.unlock-hint.show{opacity:1}
</style>
</head>
<body>
<div class="main-container">

<h1 id="controlTitle">南朝輿圖 · 蕭梁疆域</h1>

<button class="view-tab" data-view="jiankang">建康城圖</button>
</div>
</div>
<canvas id="mapCanvas"></canvas>
<div class="unlock-hint" id="unlockHint">[點擊探索建康城]</div>
<div class="legend" id="mapLegend"></div>
<div class="zoom-controls">
<button class="zoom-btn" id="zoomIn">+</button>
<button class="zoom-btn" id="zoomOut">−</button>
<button class="zoom-btn" id="zoomReset">R</button>
</div>
<!-- 迷你地图 -->
<div class="minimap-wrap" id="minimapWrap">
<div class="minimap-title">輿圖略覽</div>
<canvas id="minimapCanvas"></canvas>
</div>
<!-- 时间轴 -->
<div class="timeline-container" id="timelineContainer">
<button class="timeline-btn" id="phasePrev">◀</button>
<div class="timeline-phases">
<div class="phase-item"><button class="phase-btn active" data-phase="0">宋末齊初</button></div>
<div class="phase-separator"></div>
<div class="phase-item"><button class="phase-btn" data-phase="1">齊末梁初</button></div>
<div class="phase-separator"></div>
<div class="phase-item"><button class="phase-btn" data-phase="2">梁朝盛世</button></div>
<div class="phase-separator"></div>
<div class="phase-item"><button class="phase-btn" data-phase="3">侯景之亂</button></div>
</div>
<button class="timeline-btn" id="phaseNext">▶</button>
<div class="timeline-desc" id="timelineDesc">宋末齊初：蕭衍據雍州，與荆州結盟，蓄勢待發</div>
</div>
</div>
<div class="info-panel" id="infoPanel">
<div class="empty-state" id="emptyState">
<p style="font-size:1.8em;color:#5c3d1f;font-weight:700">輿</p>
<p>點擊圖上之地</p>
<p>以觀歷史地理之詳</p>
</div>
<div id="panelContent" style="display:none">
<div class="panel-header">
<h2 id="panelTitle"></h2>
<div class="subtitle" id="panelSubtitle"></div>
</div>
<div class="panel-tabs" id="panelTabs" style="display:none">
<button class="panel-tab active" data-ptab="detail">詳情</button>
<button class="panel-tab" data-ptab="events">歷史事件</button>
</div>
<div class="panel-content" id="panelBody"></div>
</div>
</div>
</div>

    {id:'jiangzhou',name:'江州',capital:'尋陽',x:0.70,y:0.40,type:'economic',color:'#5a8a6a',

    {id:'jingzhou',name:'荆州',capital:'江陵',x:0.62,y:0.43,type:'military',color:'#b8342a',

    {id:'xuzhou',name:'徐州',capital:'鐘離',x:0.74,y:0.24,type:'military',color:'#b8342a',

    {id:'nanyanzhou',name:'南兗州',capital:'淮陰',x:0.73,y:0.26,type:'military',color:'#b8342a',

    {id:'sizhou',name:'司州',capital:'義陽',x:0.60,y:0.38,type:'military',color:'#b8342a',
     desc:'刺史，汉之司隶校尉也。晋江左以来，沦没戎寇。武帝北平关、洛，河南底定，置司州刺史，冶虎牢。少帝景平初，司州复没北虏。明帝复于南豫州之义阳郡立司州，渐成实土焉。领郡四，县二十。去京都水二千七百，陆一千七百。',
     detail:'司州从荆州分出，义阳位于荆豫之间，为南北交通要冲。后因北魏进攻，司州多次易手。',

     tags:['military','border'],
     counties:['义阳太守：平阳、𫑡、钟武、宝城、义阳、平春、环水（领县七，户八千三十一，口四万一千五百九十七）','随阳太守：随阳、水阳、关西、西平林（领县四，户四千六百）','安陆太守：安陆、江夏曲陵（领县二，户六千四十三，口二万五千八十四）','南汝南太守：平舆、北新息、真阳、安城、南新息、安阳、临汝（领县七）'],

    {id:'qinzhou',name:'秦州',capital:'南鄭附近',x:0.46,y:0.35,type:'border',color:'#8b6540',

// ========== 古风绘制辅助函数 ==========

function drawMountainRange(ctx, x, y, count, size, color1, color2) {
    for (var pass = 0; pass < 2; pass++) {
        ctx.beginPath();
        var startX = x - count * size;
        ctx.moveTo(startX, y);
        for (var i = 0; i < count; i++) {
            var mx = startX + i * size * 2 + size;
            var my = y - size * (0.8 + Math.sin(i * 0.7) * 0.3);
            ctx.quadraticCurveTo(mx - size * 0.3, my, mx, my);
            ctx.quadraticCurveTo(mx + size * 0.3, my, mx + size, y);
        }
        ctx.strokeStyle = pass === 0 ? color1 : color2;
        ctx.lineWidth = pass === 0 ? 1.5 : 1;
        ctx.stroke();
    }
}

function drawDoubleLineRiver(ctx, points, w, color) {
    if (points.length < 2) return;
    var offset = w / 2;
    ctx.beginPath();
    ctx.moveTo(points[0][0] * width, points[0][1] * height - offset);
    for (var i = 1; i < points.length; i++) {
        ctx.lineTo(points[i][0] * width, points[i][1] * height - offset);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(points[0][0] * width, points[0][1] * height + offset);
    for (var i = 1; i < points.length; i++) {
        ctx.lineTo(points[i][0] * width, points[i][1] * height + offset);
    }
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(points[0][0] * width, points[0][1] * height);
    for (var i = 1; i < points.length; i++) {
        ctx.lineTo(points[i][0] * width, points[i][1] * height);
    }
    ctx.strokeStyle = '#e8d5b7';
    ctx.lineWidth = Math.max(0.5, w - 3);
    ctx.stroke();
}

function drawSingleRiver(ctx, points, w, color) {
    ctx.beginPath();
    ctx.moveTo(points[0][0] * width, points[0][1] * height);
    for (var i = 1; i < points.length; i++) {
        ctx.lineTo(points[i][0] * width, points[i][1] * height);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = w;
    ctx.stroke();
}

function drawLake(ctx, x, y, r, name) {
    var cx = x * width, cy = y * height;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r * 1.3, r, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(90,138,106,.12)';
    ctx.fill();
    ctx.strokeStyle = '#5a8a6a';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    for (var wi = -1; wi <= 1; wi++) {
        ctx.beginPath();
        ctx.ellipse(cx, cy + wi * 4, r * 0.9, r * 0.4, 0, 0, Math.PI);
        ctx.strokeStyle = 'rgba(90,138,106,.3)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
    }
    ctx.fillStyle = '#3d2810';
    ctx.font = '10px "Noto Serif SC", serif';
    ctx.textAlign = 'center';
    ctx.fillText(name, cx, cy + r + 14);
}

function drawWavePattern(ctx, x, y, w, h, count, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 0.8;
    for (var row = 0; row < count; row++) {
        var ry = y + row * (h / count);
        ctx.beginPath();
        for (var xi = 0; xi < w; xi += 8) {
            ctx.arc(x + xi, ry, 3, Math.PI, 0, false);
        }
        ctx.stroke();
    }
}

function drawCityMarker(ctx, sx, sy, isCapital, isSelected, isHovered, pulseColor) {
    var boxSize = isCapital ? 12 : 8;
    if (isSelected || isHovered) {
        ctx.fillStyle = 'rgba(194,58,42,.1)';
        ctx.fillRect(sx - boxSize - 4, sy - boxSize - 4, boxSize * 2 + 8, boxSize * 2 + 8);
        ctx.strokeStyle = '#c23a2a';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(sx - boxSize - 4, sy - boxSize - 4, boxSize * 2 + 8, boxSize * 2 + 8);
    }
    // 金色/红色闪烁边框（阶段高亮）
    if (pulseColor) {
        var t = Date.now() / 600;
        var pw = boxSize + 5 + Math.sin(t) * 2.5;
        ctx.strokeStyle = pulseColor;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 3]);
        ctx.strokeRect(sx - pw, sy - pw, pw * 2, pw * 2);
        ctx.setLineDash([]);
    }
    ctx.fillStyle = '#c23a2a';
    ctx.fillRect(sx - boxSize / 2, sy - boxSize / 2, boxSize, boxSize);
    ctx.strokeStyle = '#8b1a10';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - boxSize / 2, sy - boxSize / 2, boxSize, boxSize);
}

function getStateById(id) {
    for (var i = 0; i < nationalStates.length; i++) {
        if (nationalStates[i].id === id) return nationalStates[i];
    }
    return null;
}

function drawRoute(ctx, fromState, toState, color, style, time) {
    var fx = fromState.x * width, fy = fromState.y * height;
    var tx = toState.x * width, ty = toState.y * height;
    var cx = (fx + tx) / 2 - (ty - fy) * 0.15;
    var cy = (fy + ty) / 2 + (tx - fx) * 0.15;

    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.quadraticCurveTo(cx, cy, tx, ty);
    ctx.strokeStyle = color;
    ctx.lineWidth = style === 'solid' ? 2.5 : 1.5;
    if (style === 'dashed') ctx.setLineDash([8, 6]);
    else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 路径描述
    var midX = (fx + tx) / 2 * 0.5 + cx * 0.5;
    var midY = (fy + ty) / 2 * 0.5 + cy * 0.5;
    ctx.fillStyle = '#5c3d1f';
    ctx.font = '9px "Noto Serif SC", serif';
    ctx.textAlign = 'center';

    if (style === 'solid') {
        var t = (time % 3000) / 3000;
        var px = (1 - t) * (1 - t) * fx + 2 * (1 - t) * t * cx + t * t * tx;
        var py = (1 - t) * (1 - t) * fy + 2 * (1 - t) * t * cy + t * t * ty;
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        // 小圆点拖尾
        for (var ti = 1; ti <= 3; ti++) {
            var tt = ((time - ti * 200) % 3000) / 3000;
            if (tt < 0) tt += 1;
            var ppx = (1 - tt) * (1 - tt) * fx + 2 * (1 - tt) * tt * cx + tt * tt * tx;
            var ppy = (1 - tt) * (1 - tt) * fy + 2 * (1 - tt) * tt * cy + tt * tt * ty;
            ctx.beginPath();
            ctx.arc(ppx, ppy, 4 - ti, 0, Math.PI * 2);
            ctx.fillStyle = color + '60';
            ctx.fill();
        }
    }
    return { mx: midX, my: midY };
}

// ========== 渲染函数 ==========
function render(time) {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = '#e8d5b7';
    ctx.fillRect(0, 0, width, height);
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    if (currentView === 'national') { renderNational(time || 0); }
    else { renderJiankang(time || 0); }
    ctx.restore();
    // 迷你地图
    if (currentView === 'national') { drawMinimap(); }
}

function renderNational(time) {
    // 1. 计里画方网格
    ctx.strokeStyle = 'rgba(160,130,80,.12)';
    ctx.lineWidth = 0.5;
    var gridSpacing = 60;
    for (var gx = 0; gx < width; gx += gridSpacing) {
        ctx.beginPath();
        ctx.moveTo(gx, 0);
        ctx.lineTo(gx, height);
        ctx.stroke();
    }
    for (var gy = 0; gy < height; gy += gridSpacing) {
        ctx.beginPath();
        ctx.moveTo(0, gy);
        ctx.lineTo(width, gy);
        ctx.stroke();
    }

    // 2. 疆域边界
    ctx.beginPath();
    ctx.moveTo(nationalBoundary[0][0] * width, nationalBoundary[0][1] * height);
    for (var i = 1; i < nationalBoundary.length; i++) {
        ctx.lineTo(nationalBoundary[i][0] * width, nationalBoundary[i][1] * height);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(160,120,60,.05)';
    ctx.fill();
    ctx.strokeStyle = '#5c3d1f';
    ctx.lineWidth = 3;
    ctx.stroke();

    // 3. 边界外波浪纹
    drawWavePattern(ctx, 0.92 * width, 0.08 * height, 0.10 * width, 0.85 * height, 18, 'rgba(90,138,106,.2)');
    drawWavePattern(ctx, 0.93 * width, 0.12 * height, 0.08 * width, 0.78 * height, 14, 'rgba(90,138,106,.15)');
    drawWavePattern(ctx, 0.50 * width, 0.88 * height, 0.50 * width, 0.08 * height, 6, 'rgba(90,138,106,.18)');

    // 4. 湖泊
    for (var li = 0; li < nationalLakes.length; li++) {
        var lk = nationalLakes[li];
        drawLake(ctx, lk.x, lk.y, lk.r, lk.name);
    }

    // 5. 河流
    for (var ri = 0; ri < nationalRivers.length; ri++) {
        var rv = nationalRivers[ri];
        if (rv.name === '長江') {
            drawDoubleLineRiver(ctx, rv.pts, rv.w, '#8b6540');
        } else if (rv.w >= 2.5) {
            drawDoubleLineRiver(ctx, rv.pts, rv.w * 0.7, '#a07050');
        } else {
            drawSingleRiver(ctx, rv.pts, rv.w, '#a07050');
        }
        var rmp = rv.pts[Math.floor(rv.pts.length / 2)];
        ctx.save();
        ctx.fillStyle = '#3d2810';
        ctx.font = '11px "Noto Serif SC", serif';
        ctx.textAlign = 'center';
        var chars = rv.name.split('');
        var charSpacing = 13;
        var nameStartY = rmp[1] * height - (chars.length - 1) * charSpacing / 2;
        for (var ci = 0; ci < chars.length; ci++) {
            ctx.fillText(chars[ci], rmp[0] * width - 12, nameStartY + ci * charSpacing);
        }
        ctx.restore();
    }

    // 6. 山脉
    for (var mi = 0; mi < nationalMountains.length; mi++) {
        var m = nationalMountains[mi];
        var midPt = m.pts[Math.floor(m.pts.length / 2)];
        for (var pi = 0; pi < m.pts.length; pi++) {
            var px = m.pts[pi][0] * width;
            var py = m.pts[pi][1] * height;
            drawMountainRange(ctx, px, py, 6, 8, '#3a6b7c', '#5a8a6a');
        }
        ctx.save();
        ctx.fillStyle = '#3d2810';
        ctx.font = '11px "Noto Serif SC", serif';
        ctx.textAlign = 'center';
        var mChars = m.name.split('');
        var mSpacing = 13;
        var mStartY = midPt[1] * height - 28 - (mChars.length - 1) * mSpacing / 2;
        for (var mci = 0; mci < mChars.length; mci++) {
            ctx.fillText(mChars[mci], midPt[0] * width, mStartY + mci * mSpacing);
        }
        ctx.restore();
    }

    // 7. 路径（阶段驱动）
    var routeList = ROUTES[currentPhase] || [];
    for (var ri = 0; ri < routeList.length; ri++) {
        var r = routeList[ri];
        var fs = getStateById(r.from);
        var ts = getStateById(r.to);
        if (fs && ts) {
            drawRoute(ctx, fs, ts, r.color, r.style, time);
            // 路径文字标注
            var fxx = fs.x * width, fyy = fs.y * height;
            var txx = ts.x * width, tyy = ts.y * height;
            var cxx = (fxx + txx) / 2 - (tyy - fyy) * 0.15;
            var cyy = (fyy + tyy) / 2 + (txx - fxx) * 0.15;
            var mxx = (fxx + txx) / 2 * 0.5 + cxx * 0.5;
            var myy = (fyy + tyy) / 2 * 0.5 + cyy * 0.5;
            ctx.fillStyle = '#5c3d1f';
            ctx.font = '9px "Noto Serif SC", serif';
            ctx.textAlign = 'center';
            ctx.fillText(r.desc, mxx, myy - 10);
        }
    }

    // 8. 州治/城市
    var hl = PHASE_HIGHLIGHT[currentPhase] || { states: [], pulseColor: '' };
    for (var si = 0; si < nationalStates.length; si++) {
        var s = nationalStates[si];
        var sx = s.x * width, sy = s.y * height;
        var isHL = hl.states.indexOf(s.id) >= 0;

        // 扬州脉冲（始终）
        if (s.id === 'yangzhou') {
            var t = Date.now() / 800;
            var pr = 13 + Math.sin(t) * 4;
            ctx.beginPath();
            ctx.arc(sx, sy, pr, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(194,58,42,.25)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // 阶段高亮光晕
        if (isHL && hl.glowColor) {
            var gt = Date.now() / 700;
            var gr = 22 + Math.sin(gt) * 5;
            var grad = ctx.createRadialGradient(sx, sy, 2, sx, sy, gr);
            grad.addColorStop(0, hl.glowColor);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(sx, sy, gr, 0, Math.PI * 2);
            ctx.fill();
        }

        // 盛世建康金色光晕
        if (currentPhase === 2 && s.id === 'yangzhou') {
            var grad2 = ctx.createRadialGradient(sx, sy, 5, sx, sy, 45);
            grad2.addColorStop(0, 'rgba(212,168,83,.45)');
            grad2.addColorStop(1, 'rgba(212,168,83,0)');
            ctx.fillStyle = grad2;
            ctx.beginPath();
            ctx.arc(sx, sy, 45, 0, Math.PI * 2);
            ctx.fill();
        }

        var isSel = s === selectedRegion;
        var isHov = s === hoveredRegion;
        drawCityMarker(ctx, sx, sy, s.type === 'capital', isSel, isHov, isHL ? hl.pulseColor : '');

        ctx.fillStyle = '#3d2810';
        ctx.font = (s.type === 'capital' ? 'bold 13px' : '13px') + ' "Noto Serif SC", serif';
        ctx.textAlign = 'left';
        ctx.fillText(s.name, sx + 10, sy - 6);
        ctx.font = '10px "Noto Serif SC", serif';
        ctx.fillStyle = '#5c3d1f';
        ctx.fillText(s.capital, sx + 10, sy + 8);
    }

    // 9. 图题
    ctx.fillStyle = '#3d2810';
    ctx.font = 'bold 14px "Noto Serif SC", serif';
    ctx.textAlign = 'left';
    ctx.fillText('南朝疆域圖（蕭梁時期）', 24, height - 24);
    ctx.fillStyle = '#5c3d1f';
    ctx.font = '10px "Noto Serif SC", serif';
    ctx.fillText('參考：譚其驤《中國歷史地圖集》第四冊', 24, height - 42);
}

function renderJiankang(time) {
    ctx.strokeStyle = 'rgba(160,130,80,.10)';
    ctx.lineWidth = 0.5;
    var gridSpacing = 60;
    for (var gx = 0; gx < width; gx += gridSpacing) {
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, height); ctx.stroke();
    }
    for (var gy = 0; gy < height; gy += gridSpacing) {
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(width, gy); ctx.stroke();
    }

    var wallFills = { palace: 'rgba(194,58,42,.08)', city: 'rgba(92,61,31,.04)', outer: 'rgba(90,138,106,.03)' };
    var wallStrokes = { palace: '#5c3d1f', city: '#5c3d1f', outer: 'rgba(92,61,31,.4)' };
    var wallWidths = { palace: 4, city: 3, outer: 2 };
    for (var wi = 0; wi < jkWalls.length; wi++) {
        var w = jkWalls[wi];
        var wx = w.rect[0] * width, wy = w.rect[1] * height;
        var ww = w.rect[2] * width, wh = w.rect[3] * height;
        ctx.fillStyle = wallFills[w.type];
        ctx.fillRect(wx, wy, ww, wh);
        ctx.strokeStyle = wallStrokes[w.type];
        ctx.lineWidth = wallWidths[w.type];
        if (w.type === 'outer') { ctx.setLineDash([8, 4]); }
        ctx.strokeRect(wx, wy, ww, wh);
        ctx.setLineDash([]);
        ctx.fillStyle = '#3d2810';
        ctx.font = '11px "Noto Serif SC", serif';
        ctx.textAlign = 'left';
        ctx.fillText(w.name, wx + 5, wy + 15);
    }

    for (var si = 0; si < jkStreets.length; si++) {
        var st = jkStreets[si];
        ctx.beginPath();
        ctx.moveTo(st.from[0] * width, st.from[1] * height);
        ctx.lineTo(st.to[0] * width, st.to[1] * height);
        ctx.strokeStyle = '#a07050';
        ctx.lineWidth = st.main ? 2.5 : 1.5;
        ctx.stroke();
        var smx = (st.from[0] + st.to[0]) / 2 * width;
        var smy = (st.from[1] + st.to[1]) / 2 * height;
        ctx.fillStyle = '#5c3d1f';
        ctx.font = '9px "Noto Serif SC", serif';
        ctx.textAlign = 'center';
        ctx.fillText(st.name, smx, smy - 5);
    }

    for (var ri = 0; ri < jkRivers.length; ri++) {
        var rv = jkRivers[ri];
        var fromPt = [rv.from[0] * width, rv.from[1] * height];
        var toPt = [rv.to[0] * width, rv.to[1] * height];
        var lw = rv.main ? 10 : 5;
        var offset = lw / 2;
        ctx.beginPath();
        ctx.moveTo(fromPt[0], fromPt[1] - offset);
        ctx.lineTo(toPt[0], toPt[1] - offset);
        ctx.strokeStyle = '#8b6540';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(fromPt[0], fromPt[1] + offset);
        ctx.lineTo(toPt[0], toPt[1] + offset);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(fromPt[0], fromPt[1]);
        ctx.lineTo(toPt[0], toPt[1]);
        ctx.strokeStyle = '#e8d5b7';
        ctx.lineWidth = Math.max(1, lw - 3);
        ctx.stroke();
        var rmx = (rv.from[0] + rv.to[0]) / 2 * width;
        var rmy = (rv.from[1] + rv.to[1]) / 2 * height;
        ctx.fillStyle = '#3d2810';
        ctx.font = '11px "Noto Serif SC", serif';
        ctx.textAlign = 'center';
        ctx.fillText(rv.name, rmx, rmy - (rv.main ? 14 : 10));
    }

    for (var gi = 0; gi < jkGates.length; gi++) {
        var g = jkGates[gi];
        var gx = g.x * width, gy = g.y * height;
        ctx.fillStyle = '#c23a2a';
        ctx.fillRect(gx - 5, gy - 5, 10, 10);
        ctx.strokeStyle = '#8b1a10';
        ctx.lineWidth = 1;
        ctx.strokeRect(gx - 5, gy - 5, 10, 10);
        ctx.fillStyle = '#3d2810';
        ctx.font = '9px "Noto Serif SC", serif';
        ctx.textAlign = 'center';
        ctx.fillText(g.name, gx, gy + 16);
    }

    var typeColors = {
        gate: '#c23a2a', residence: '#8b6540', fort: '#5c3d1f',
        market: '#3a6b7c', temple: '#c23a2a', mountain: '#3a6b7c',
        water: '#5a8a6a', palace: '#c23a2a', craft: '#8b6540'
    };
    for (var li = 0; li < jkLandmarks.length; li++) {
        var lm = jkLandmarks[li];
        var lx = lm.x * width, ly = lm.y * height;
        var isSel = lm === selectedRegion;
        var isHov = lm === hoveredRegion;
        if (isSel || isHov) {
            ctx.fillStyle = 'rgba(194,58,42,.08)';
            ctx.fillRect(lx - lm.r - 4, ly - lm.r - 4, lm.r * 2 + 8, lm.r * 2 + 8);
            ctx.strokeStyle = '#c23a2a';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(lx - lm.r - 4, ly - lm.r - 4, lm.r * 2 + 8, lm.r * 2 + 8);
        }
        var col = typeColors[lm.type] || '#c23a2a';
        if (lm.type === 'mountain' || lm.type === 'water') {
            ctx.beginPath();
            ctx.arc(lx, ly, lm.r, 0, Math.PI * 2);
            ctx.fillStyle = col + '40';
            ctx.fill();
            ctx.strokeStyle = col;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        } else {
            ctx.fillStyle = col;
            ctx.fillRect(lx - lm.r / 2, ly - lm.r / 2, lm.r, lm.r);
            ctx.strokeStyle = '#3d2810';
            ctx.lineWidth = 0.8;
            ctx.strokeRect(lx - lm.r / 2, ly - lm.r / 2, lm.r, lm.r);
        }
        ctx.fillStyle = '#3d2810';
        ctx.font = 'bold 10px "Noto Serif SC", serif';
        ctx.textAlign = 'center';
        ctx.fillText(lm.name, lx, ly + lm.r + 13);
    }

    ctx.fillStyle = 'rgba(92,61,31,.18)';
    ctx.font = 'bold 13px "Noto Serif SC", serif';
    ctx.textAlign = 'center';
    ctx.fillText('長干里居民區', 0.56 * width, 0.86 * height);
    ctx.fillStyle = 'rgba(58,107,124,.15)';
    ctx.fillText('秦淮商業區', 0.50 * width, 0.68 * height);
    ctx.fillStyle = 'rgba(139,101,64,.18)';
    ctx.font = 'bold 12px "Noto Serif SC", serif';
    ctx.fillText('斗場手工業區', 0.68 * width, 0.56 * height);

    ctx.fillStyle = '#3d2810';
    ctx.font = 'bold 14px "Noto Serif SC", serif';
    ctx.textAlign = 'left';
    ctx.fillText('建康城平面圖（蕭梁時期）', 24, height - 24);
    ctx.fillStyle = '#5c3d1f';
    ctx.font = '10px "Noto Serif SC", serif';
    ctx.fillText('數據來源：《景定建康志》《丹陽記》', 24, height - 42);
    ctx.fillText('參考：譚其驤《中國歷史地圖集》、考古發現', 24, height - 56);
}

// ========== 迷你地图 ==========
function drawMinimap() {
    miniCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    miniCtx.clearRect(0, 0, miniW, miniH);
    miniCtx.fillStyle = 'rgba(232,213,183,.9)';
    miniCtx.fillRect(0, 0, miniW, miniH);

    var mScaleX = miniW / width;
    var mScaleY = miniH / height;

    // 简化疆域轮廓
    miniCtx.beginPath();
    miniCtx.moveTo(nationalBoundary[0][0] * miniW, nationalBoundary[0][1] * miniH);
    for (var i = 1; i < nationalBoundary.length; i++) {
        miniCtx.lineTo(nationalBoundary[i][0] * miniW, nationalBoundary[i][1] * miniH);
    }
    miniCtx.closePath();
    miniCtx.fillStyle = 'rgba(160,120,60,.08)';
    miniCtx.fill();
    miniCtx.strokeStyle = '#5c3d1f';
    miniCtx.lineWidth = 1.2;
    miniCtx.stroke();

    // 州治小红点
    for (var si = 0; si < nationalStates.length; si++) {
        var s = nationalStates[si];
        miniCtx.fillStyle = s.type === 'capital' ? '#c23a2a' : '#8b6540';
        miniCtx.beginPath();
        miniCtx.arc(s.x * miniW, s.y * miniH, s.type === 'capital' ? 2.5 : 1.8, 0, Math.PI * 2);
        miniCtx.fill();
    }

    // 当前选中州
    if (selectedRegion && selectedRegion.id) {
        var sel = selectedRegion;
        miniCtx.fillStyle = '#c23a2a';
        miniCtx.beginPath();
        miniCtx.arc(sel.x * miniW, sel.y * miniH, 4, 0, Math.PI * 2);
        miniCtx.fill();
        miniCtx.strokeStyle = '#e8d5b7';
        miniCtx.lineWidth = 1;
        miniCtx.stroke();
    }

    // 视口矩形
    var vx = -offsetX / scale / width * miniW;
    var vy = -offsetY / scale / height * miniH;
    var vw = (width / scale) / width * miniW;
    var vh = (height / scale) / height * miniH;
    miniCtx.strokeStyle = 'rgba(92,61,31,.5)';
    miniCtx.lineWidth = 1;
    miniCtx.setLineDash([3, 2]);
    miniCtx.strokeRect(vx, vy, vw, vh);
    miniCtx.setLineDash([]);
    miniCtx.fillStyle = 'rgba(92,61,31,.08)';
    miniCtx.fillRect(vx, vy, vw, vh);
}

// ========== 交互 ==========
function getRegionAt(x, y) {
    var mx = (x - offsetX) / scale, my = (y - offsetY) / scale;
    if (currentView === 'national') {
        for (var i = 0; i < nationalStates.length; i++) {
            var s = nationalStates[i];
            var dx = mx - s.x * width, dy = my - s.y * height;
            if (Math.sqrt(dx * dx + dy * dy) <= 22) return s;
        }
    } else {
        for (var i = 0; i < jkLandmarks.length; i++) {
            var lm = jkLandmarks[i];
            var dx = mx - lm.x * width, dy = my - lm.y * height;
            if (Math.sqrt(dx * dx + dy * dy) <= lm.r + 5) return lm;
        }
        for (var i = 0; i < jkGates.length; i++) {
            var g = jkGates[i];
            var dx = mx - g.x * width, dy = my - g.y * height;
            if (Math.sqrt(dx * dx + dy * dy) <= 12) return g;
        }
        for (var i = 0; i < jkWalls.length; i++) {
            var w = jkWalls[i];
            var r = w.rect;
            if (mx >= r[0] * width && mx <= (r[0] + r[2]) * width && my >= r[1] * height && my <= (r[1] + r[3]) * height) return w;
        }
    }
    return null;
}

function showRegionDetail(region) {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('panelContent').style.display = 'block';
    document.getElementById('panelTitle').textContent = region.name;
    document.getElementById('panelSubtitle').textContent = currentView === 'national' ? '治所：' + region.capital : '建康城地標';
    document.getElementById('panelTabs').style.display = currentView === 'national' ? 'flex' : 'none';

    // 默认显示详情
    panelTab = 'detail';
    updatePanelTabs();
    renderPanelBody(region);
}

function updatePanelTabs() {
    document.querySelectorAll('.panel-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.ptab === panelTab);
    });
}

function renderPanelBody(region) {
    var tagsHtml = '', bodyHtml = '';
    if (currentView === 'national') {
        var tm = { capital: ['tag-capital', '京畿'], military: ['tag-military', '軍事重鎮'], economic: ['tag-economic', '經濟中心'], cultural: ['tag-cultural', '文化中心'], border: ['tag-border', '邊陲'] };
        tagsHtml = (region.tags || []).map(function (t) { var m = tm[t] || ['', '']; return '<span class="tag ' + m[0] + '">' + m[1] + '</span>'; }).join('');
        var linkBtn = region.id === 'yangzhou' ? '<br><button class="btn-link" id="enterJiankang">進入建康城</button>' : '';
        if (panelTab === 'detail') {
            bodyHtml = '<div class="panel-section"><h3>地理位置</h3><p>' + region.desc + '</p></div>' +
                '<div class="panel-section"><h3>歷史概況</h3><p>' + region.detail + '</p>' +
                '<div class="quote">"' + region.quote + '"</div>' +
                '<p style="font-size:.8em;color:#8b6540;text-align:right">—— ' + region.source + '</p>' +
                linkBtn + '</div>' +
                '<div class="panel-section"><h3>轄郡（部分）</h3><div class="county-list">' +
                (region.counties || []).map(function (c) { return '<span class="county-tag">' + c + '</span>'; }).join('') +
                '</div></div>';
        } else {
            var evt = (region.phaseEvents && region.phaseEvents[currentPhase]) ? region.phaseEvents[currentPhase] : '該階段無詳細記載。';
            bodyHtml = '<div class="panel-section"><h3>' + PHASE_NAMES[currentPhase] + ' · 大事記</h3><p>' + evt + '</p></div>' +
                '<div class="panel-section"><h3>各時期回顧</h3>' +
                Object.keys(region.phaseEvents || {}).map(function(k) {
                    var phaseIdx = parseInt(k);
                    var isCur = phaseIdx === currentPhase;
                    return '<p style="font-size:.82em;line-height:1.7;margin-bottom:8px;padding:6px 8px;border-radius:2px;' + (isCur ? 'background:rgba(160,120,60,.1);border-left:3px solid #8b6540;' : '') + '"><strong style="color:#5c3d1f">' + PHASE_NAMES[phaseIdx] + '：</strong>' + region.phaseEvents[k] + '</p>';
                }).join('') +
                '</div>';
        }
    } else {
        var typeMap = { palace: '宮殿', city: '城牆', outer: '外郭', gate: '城門', residence: '民居', fort: '城壘', market: '市集', temple: '寺院', mountain: '山嶽', water: '水域', craft: '作坊' };
        var tagCls = { residence: 'tag-residence', market: 'tag-market', craft: 'tag-craft', palace: 'tag-capital', fort: 'tag-military', temple: 'tag-cultural' };
        tagsHtml = '<span class="tag ' + (tagCls[region.type] || 'tag-cultural') + '">' + (typeMap[region.type] || region.type) + '</span>';
        // 建康城解锁提示
        var unlockLine = '<p style="color:#8b6540;font-size:.82em;margin-bottom:10px;">&#128275; 已解鎖建康城 · 蕭梁京畿核心區域</p>';
        bodyHtml = unlockLine + '<div class="panel-section"><h3>位置與功能</h3><p>' + region.desc + '</p></div>';
    }
    document.getElementById('panelBody').innerHTML = '<div class="tag-list">' + tagsHtml + '</div>' + bodyHtml;

    var enterBtn = document.getElementById('enterJiankang');
    if (enterBtn) enterBtn.onclick = switchToJiankang;
}

function switchToJiankang() {
    document.querySelectorAll('.view-tab').forEach(function (t) { t.classList.remove('active'); });
    document.querySelector('[data-view="jiankang"]').classList.add('active');
    currentView = 'jiankang';
    document.getElementById('controlTitle').textContent = '建康城圖 · 蕭梁京畿';
    scale = 1.1; offsetX = -width * 0.05; offsetY = -height * 0.03;
    selectedRegion = null;
    updateLegend();
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('panelContent').style.display = 'none';
}

function switchToNational() {
    document.querySelectorAll('.view-tab').forEach(function (t) { t.classList.remove('active'); });
    document.querySelector('[data-view="national"]').classList.add('active');
    currentView = 'national';
    document.getElementById('controlTitle').textContent = '南朝輿圖 · 蕭梁疆域';
    scale = 1; offsetX = 0; offsetY = 0; selectedRegion = null;
    updateLegend();
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('panelContent').style.display = 'none';
}

function updateLegend() {
    var legend = document.getElementById('mapLegend');
    if (currentView === 'national') {
        legend.innerHTML = '<div class="legend-title">圖例</div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#c23a2a;width:12px;height:12px;border-radius:0"></div><span>京畿（揚州）</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#b8342a;border-radius:0"></div><span>軍事重鎮</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#5a8a6a;border-radius:0"></div><span>經濟中心</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#8b6540;border-radius:0"></div><span>邊陲州郡</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#8b6540;width:20px;height:3px;border-radius:0"></div><span>河流</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#3a6b7c;width:20px;height:10px;border-radius:0;clip-path:polygon(10% 100%,20% 30%,35% 60%,50% 10%,65% 50%,80% 25%,90% 100%)"></div><span>山嶺</span></div>';
    } else {
        legend.innerHTML = '<div class="legend-title">圖例</div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#c23a2a;border-radius:0"></div><span>宮殿/寺院</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#8b6540;border-radius:0"></div><span>居民區</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#3a6b7c;border-radius:0"></div><span>商業區</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#8b6540;border-radius:0;opacity:.7"></div><span>手工業區</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#c23a2a;border-radius:0;width:8px;height:8px"></div><span>城門/要塞</span></div>' +
            '<div class="legend-item"><div class="legend-dot" style="background:#8b6540;width:20px;height:4px;border-radius:0"></div><span>秦淮河</span></div>';
    }
}

function updatePhaseUI() {
    document.querySelectorAll('.phase-btn').forEach(function(btn) {
        btn.classList.toggle('active', parseInt(btn.dataset.phase) === currentPhase);
    });
    document.getElementById('timelineDesc').textContent = PHASE_DESCS[currentPhase];
}

function setPhase(p) {
    currentPhase = Math.max(0, Math.min(3, p));
    updatePhaseUI();
    if (selectedRegion && currentView === 'national') {
        renderPanelBody(selectedRegion);
    }
}

function updateUnlockHint() {
    var hint = document.getElementById('unlockHint');
    if (currentView === 'national' && hoveredRegion && hoveredRegion.id === 'yangzhou') {
        var rect = canvas.getBoundingClientRect();
        var sx = hoveredRegion.x * width * scale + offsetX + rect.left;
        var sy = hoveredRegion.y * height * scale + offsetY + rect.top;
        hint.style.left = (sx + 20) + 'px';
        hint.style.top = (sy - 20) + 'px';
        hint.classList.add('show');
    } else {
        hint.classList.remove('show');
    }
}

// ========== 事件绑定 ==========
canvas.addEventListener('mousedown', function (e) {
    var rect = canvas.getBoundingClientRect();
    lastX = e.clientX - rect.left; lastY = e.clientY - rect.top; isDragging = true;
    var region = getRegionAt(lastX, lastY);
    if (region) { selectedRegion = region; showRegionDetail(region); }
});
canvas.addEventListener('mousemove', function (e) {
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left, y = e.clientY - rect.top;
    if (isDragging) { offsetX += x - lastX; offsetY += y - lastY; lastX = x; lastY = y; }
    else { hoveredRegion = getRegionAt(x, y); canvas.style.cursor = hoveredRegion ? 'pointer' : 'grab'; }
    updateUnlockHint();
});
canvas.addEventListener('mouseup', function () { isDragging = false; });
canvas.addEventListener('mouseleave', function () { isDragging = false; updateUnlockHint(); });
canvas.addEventListener('wheel', function (e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left, y = e.clientY - rect.top;
    var factor = e.deltaY < 0 ? 1.1 : 0.9;
    var ns = Math.max(0.5, Math.min(4, scale * factor));
    offsetX = x - (x - offsetX) * (ns / scale); offsetY = y - (y - offsetY) * (ns / scale); scale = ns;
}, { passive: false });

canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    var touch = e.touches[0], rect = canvas.getBoundingClientRect();
    lastX = touch.clientX - rect.left; lastY = touch.clientY - rect.top; isDragging = true;
    var region = getRegionAt(lastX, lastY);
    if (region) { selectedRegion = region; showRegionDetail(region); }
}, { passive: false });
canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    if (isDragging && e.touches.length === 1) {
        var touch = e.touches[0], rect = canvas.getBoundingClientRect();
        var x = touch.clientX - rect.left, y = touch.clientY - rect.top;
        offsetX += x - lastX; offsetY += y - lastY; lastX = x; lastY = y;
    }
}, { passive: false });
canvas.addEventListener('touchend', function () { isDragging = false; });

document.querySelectorAll('.view-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
        document.querySelectorAll('.view-tab').forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentView = tab.dataset.view;
        document.getElementById('controlTitle').textContent = currentView === 'national' ? '南朝輿圖 · 蕭梁疆域' : '建康城圖 · 蕭梁京畿';
        scale = 1; offsetX = 0; offsetY = 0; selectedRegion = null;
        updateLegend();
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('panelContent').style.display = 'none';
    });
});

document.getElementById('zoomIn').addEventListener('click', function () { scale = Math.min(4, scale * 1.2); });
document.getElementById('zoomOut').addEventListener('click', function () { scale = Math.max(0.5, scale / 1.2); });
document.getElementById('zoomReset').addEventListener('click', function () { scale = 1; offsetX = 0; offsetY = 0; });

// 时间轴按钮
document.querySelectorAll('.phase-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { setPhase(parseInt(btn.dataset.phase)); });
});
document.getElementById('phasePrev').addEventListener('click', function() { setPhase(currentPhase - 1); });
document.getElementById('phaseNext').addEventListener('click', function() { setPhase(currentPhase + 1); });

// 信息面板标签页
document.querySelectorAll('.panel-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
        panelTab = tab.dataset.ptab;
        updatePanelTabs();
        if (selectedRegion) renderPanelBody(selectedRegion);
    });
});

// 迷你地图点击导航
document.getElementById('minimapWrap').addEventListener('click', function(e) {
    if (currentView !== 'national') return;
    var rect = miniCanvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) / miniW;
    var my = (e.clientY - rect.top) / miniH;
    // 寻找最近的州
    var nearest = null, minD = Infinity;
    for (var i = 0; i < nationalStates.length; i++) {
        var s = nationalStates[i];
        var d = Math.sqrt((mx - s.x) * (mx - s.x) + (my - s.y) * (my - s.y));
        if (d < minD) { minD = d; nearest = s; }
    }
    if (nearest) {
        selectedRegion = nearest;
        offsetX = width / 2 - nearest.x * width * scale;
        offsetY = height / 2 - nearest.y * height * scale;
        showRegionDetail(nearest);
    }
});

// ========== 动画循环 ==========
function animate(time) {
    render(time);
    requestAnimationFrame(animate);
}

// ========== 初始化 ==========
resize();
updateLegend();
updatePhaseUI();
requestAnimationFrame(animate);
setTimeout(function () { resize(); }, 200);
window.addEventListener('resize', function () { resize(); });
</script>
