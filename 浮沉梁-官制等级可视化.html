<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南朝官制等级可视化 - 浮沉梁</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a0f0a;
            --bg-card: #2a1b12;
            --bg-card-hover: #3a2a1e;
            --text-primary: #e8d5b7;
            --text-secondary: #c4a882;
            --gold: #d4a853;
            --gold-light: #e8c97a;
            --gold-dark: #8b6914;
            --red-terracotta: #8b4513;
            --border-color: #3d2b1f;
            --border-gold: #5a4528;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-dark);
        }

        /* 主容器 */
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧控制面板 */
        .left-panel {
            width: 320px;
            min-width: 320px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }

        .panel-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 4px;
        }

        .panel-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            letter-spacing: 2px;
        }

        .panel-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 14px;
            color: var(--gold-light);
            margin-bottom: 12px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: var(--gold);
            border-radius: 2px;
        }

        /* 朝代切换按钮 */
        .dynasty-tabs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dynasty-btn {
            position: relative;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            color: var(--text-primary);
        }

        .dynasty-btn:hover {
            border-color: var(--gold-dark);
            background: var(--bg-card-hover);
        }

        .dynasty-btn.active {
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.08);
        }

        .dynasty-btn .dynasty-name {
            font-size: 16px;
            font-weight: 600;
            display: block;
        }

        .dynasty-btn .dynasty-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
        }

        .dynasty-btn.active .dynasty-name {
            color: var(--gold);
        }

        /* 类别筛选 */
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-tab {
            padding: 6px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .filter-tab:hover {
            border-color: var(--gold-dark);
            color: var(--text-primary);
        }

        .filter-tab.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 168, 83, 0.08);
        }

        /* 梁Tab切换 */
        .liang-tabs {
            display: flex;
            gap: 8px;
        }

        .liang-tab {
            flex: 1;
            padding: 10px 8px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            font-family: inherit;
            text-align: center;
        }

        .liang-tab:hover {
            border-color: var(--gold-dark);
            color: var(--text-primary);
        }

        .liang-tab.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 168, 83, 0.08);
        }

        /* 提示开关 */
        .hint-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }

        .hint-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch.on {
            background: rgba(212, 168, 83, 0.2);
            border-color: var(--gold);
        }

        .toggle-switch .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .toggle-switch.on .toggle-knob {
            left: 22px;
            background: var(--gold);
        }

        /* 底部提示 */
        .panel-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.6;
        }

        /* 中间展示区域 */
        .main-display {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg-dark);
        }

        .display-header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .display-title {
            font-size: 20px;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 2px;
        }

        .display-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* 卡片样式 */
        .category-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .category-card:hover {
            border-color: var(--border-gold);
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateY(-2px);
        }

        .category-header {
            padding: 14px 18px;
            background: rgba(212, 168, 83, 0.04);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--gold-light);
        }

        .category-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .officials-list {
            padding: 8px 0;
        }

        .official-item {
            display: flex;
            align-items: center;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(61, 43, 31, 0.3);
            position: relative;
        }

        .official-item:last-child {
            border-bottom: none;
        }

        .official-item:hover {
            background: var(--bg-card-hover);
        }

        .official-item.selected {
            background: rgba(212, 168, 83, 0.08);
        }

        .official-rank-tag {
            min-width: 56px;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            text-align: center;
            margin-right: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .rank-high {
            background: rgba(212, 168, 83, 0.15);
            color: var(--gold);
            border: 1px solid rgba(212, 168, 83, 0.3);
        }

        .rank-mid {
            background: rgba(201, 160, 78, 0.1);
            color: #c9a04e;
            border: 1px solid rgba(201, 160, 78, 0.2);
        }

        .rank-low {
            background: rgba(139, 105, 20, 0.1);
            color: var(--gold-dark);
            border: 1px solid rgba(139, 105, 20, 0.2);
        }

        .rank-unknown {
            background: rgba(196, 168, 130, 0.08);
            color: var(--text-secondary);
            border: 1px solid rgba(196, 168, 130, 0.15);
        }

        .official-info {
            flex: 1;
            min-width: 0;
        }

        .official-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .official-desc-short {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hint-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--border-gold);
            color: var(--bg-dark);
            font-size: 10px;
            cursor: help;
            font-weight: 700;
            flex-shrink: 0;
        }

        .hint-icon:hover {
            background: var(--gold);
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            background: var(--bg-card-hover);
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-primary);
            max-width: 240px;
            z-index: 1000;
            box-shadow: 0 4px 12px var(--shadow);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            line-height: 1.5;
        }

        .tooltip.show {
            opacity: 1;
        }

        /* 十八班样式 */
        .ban-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ban-row {
            display: flex;
            align-items: flex-start;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .ban-row:hover {
            border-color: var(--border-gold);
            background: var(--bg-card-hover);
            transform: translateX(4px);
        }

        .ban-row.selected {
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.08);
        }

        .ban-number {
            min-width: 64px;
            font-size: 18px;
            font-weight: 700;
            padding-right: 16px;
            border-right: 2px solid;
            text-align: center;
            line-height: 1.2;
            flex-shrink: 0;
        }

        .ban-top { color: var(--gold); border-color: rgba(212, 168, 83, 0.3); }
        .ban-high { color: #c9a04e; border-color: rgba(201, 160, 78, 0.25); }
        .ban-mid { color: #b8956a; border-color: rgba(184, 149, 106, 0.2); }
        .ban-low { color: var(--gold-dark); border-color: rgba(139, 105, 20, 0.2); }

        .ban-content {
            flex: 1;
            margin-left: 16px;
            min-width: 0;
        }

        .ban-officials {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .ban-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* 将军号表格 */
        .general-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .general-table th {
            background: rgba(212, 168, 83, 0.08);
            color: var(--gold);
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border-gold);
            position: sticky;
            top: 0;
        }

        .general-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        .general-table tr {
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .general-table tr:hover {
            background: var(--bg-card-hover);
        }

        .general-table tr.selected {
            background: rgba(212, 168, 83, 0.08);
        }

        .general-table .col-grade {
            width: 60px;
        }

        .general-table .col-class {
            width: 70px;
            text-align: center;
        }

        .general-table .col-names {
            min-width: 200px;
        }

        .general-table .col-desc {
            color: var(--text-secondary);
        }

        /* 右侧详情面板 */
        .right-panel {
            width: 350px;
            min-width: 350px;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            z-index: 10;
        }

        .detail-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(212, 168, 83, 0.04);
        }

        .detail-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .detail-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .detail-body {
            padding: 20px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section-title {
            font-size: 13px;
            color: var(--gold-light);
            margin-bottom: 8px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-section-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 12px;
            background: var(--gold);
            border-radius: 2px;
        }

        .detail-text {
            font-size: 13px;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .detail-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tag-rank {
            background: rgba(212, 168, 83, 0.15);
            color: var(--gold);
            border: 1px solid rgba(212, 168, 83, 0.3);
        }

        .tag-local {
            background: rgba(139, 69, 19, 0.15);
            color: #c4956a;
            border: 1px solid rgba(139, 69, 19, 0.3);
        }

        .tag-source {
            background: rgba(196, 168, 130, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(196, 168, 130, 0.2);
            font-size: 11px;
        }

        .tag-note {
            background: rgba(212, 168, 83, 0.08);
            color: var(--gold-light);
            border: 1px solid rgba(212, 168, 83, 0.15);
            font-size: 11px;
        }

        /* 地方官专属区域 */
        .local-section {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-dark);
            border: 1px dashed var(--border-gold);
            border-radius: 6px;
        }

        .local-section-title {
            font-size: 13px;
            color: var(--gold-light);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .unlock-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(212, 168, 83, 0.1);
            border: 1px solid var(--gold);
            border-radius: 4px;
            color: var(--gold);
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .unlock-btn:hover {
            background: rgba(212, 168, 83, 0.2);
        }

        .unlock-content {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .unlock-content.open {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .local-detail-item {
            margin-bottom: 10px;
        }

        .local-detail-label {
            font-size: 12px;
            color: var(--gold-light);
            margin-bottom: 4px;
        }

        .local-detail-text {
            font-size: 12px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* 空状态 */
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .app-container {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }

            .left-panel,
            .right-panel {
                width: 100%;
                min-width: auto;
                border: none;
                border-bottom: 1px solid var(--border-color);
            }

            .main-display {
                overflow: visible;
            }

            .right-panel {
                border-left: none;
                border-top: 1px solid var(--border-color);
            }
        }

        @media (max-width: 768px) {
            .panel-header {
                padding: 16px;
            }

            .panel-title {
                font-size: 18px;
            }

            .main-display {
                padding: 16px;
            }

            .ban-row {
                flex-direction: column;
            }

            .ban-number {
                border-right: none;
                border-bottom: 2px solid;
                padding-right: 0;
                padding-bottom: 8px;
                margin-bottom: 8px;
                text-align: left;
            }

            .ban-content {
                margin-left: 0;
            }

            .general-table {
                font-size: 12px;
            }

            .general-table th,
            .general-table td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧控制面板 -->
        <div class="left-panel">
            <div class="panel-header">
                <div class="panel-title">南朝官制等级</div>
                <div class="panel-subtitle">420-557年 · 宋齐梁三代</div>
            </div>

            <div class="panel-section">
                <div class="section-title">朝代选择</div>
                <div class="dynasty-tabs">
                    <div class="dynasty-btn" data-dynasty="song">
                        <span class="dynasty-name">宋</span>
                        <span class="dynasty-desc">420-479年 · 承晋制</span>
                    </div>
                    <div class="dynasty-btn" data-dynasty="qi">
                        <span class="dynasty-name">齐</span>
                        <span class="dynasty-desc">479-502年 · 沿袭宋制</span>
                    </div>
                    <div class="dynasty-btn active" data-dynasty="liang">
                        <span class="dynasty-name">梁</span>
                        <span class="dynasty-desc">梁·天监七年徐勉定十八班</span>
                    </div>
                </div>
            </div>

            <div class="panel-section" id="filter-section">
                <div class="section-title">官制类别</div>
                <div class="filter-tabs" id="filter-tabs">
                    <div class="filter-tab active" data-filter="all">全部</div>
                    <div class="filter-tab" data-filter="gongfu">公辅官</div>
                    <div class="filter-tab" data-filter="lieqing">列卿</div>
                    <div class="filter-tab" data-filter="shicong">侍从秘书官</div>
                    <div class="filter-tab" data-filter="difang">地方官</div>
                </div>
            </div>

            <div class="panel-section" id="liang-sub-tabs-section" style="display:none;">
                <div class="section-title">梁官制视图</div>
                <div class="liang-tabs">
                    <div class="liang-tab active" data-liang-tab="ban">十八班文职</div>
                    <div class="liang-tab" data-liang-tab="general">将军号十品二十四班</div>
                </div>
            </div>

            <div class="panel-section">
                <div class="hint-toggle">
                    <span class="hint-label">提示开关（显示所有说明）</span>
                    <div class="toggle-switch" id="hint-toggle">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>

            <div class="panel-footer">
                点击官职查看详情<br>
                地方官标识为需解锁专属内容
            </div>
        </div>

        <!-- 中间官制展示区域 -->
        <div class="main-display">
            <div class="display-header">
                <div class="display-title" id="display-title">梁 · 天监十八班制</div>
                <div class="display-desc" id="display-desc">天监七年（508年），徐勉为吏部尚书，革定官制为十八班。以班多者为贵。</div>
            </div>
            <div id="display-content"></div>
        </div>

        <!-- 右侧详情面板 -->
        <div class="right-panel">
            <div class="detail-header">
                <div class="detail-title" id="detail-title">详情</div>
                <div class="detail-subtitle" id="detail-subtitle">点击左侧官职查看详情</div>
            </div>
            <div class="detail-body" id="detail-body"></div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <script>
        // ===== 南朝宋官制数据 =====
        var SONG_DATA = {
            dynasty: '宋',
            period: '420-479年',

        // ===== 辅助函数 =====
        function getRankClass(rank) {
            if (!rank || rank === '-') return 'rank-unknown';
            if (rank === '一品' || rank === '从公' || rank === '二千石') return 'rank-high';
            if (rank === '二品' || rank === '三品') return 'rank-mid';
            return 'rank-low';
        }

        function getBanClass(ban) {
            if (ban >= 16) return 'ban-top';
            if (ban >= 10) return 'ban-high';
            if (ban >= 5) return 'ban-mid';
            return 'ban-low';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function truncate(str, len) {
            if (!str) return '';
            return str.length > len ? str.substring(0, len) + '...' : str;
        }

        function renderDisplay() {
            var data = DYNASTY_MAP[state.dynasty];
            var container = document.getElementById('display-content');

            var descEl = document.getElementById('display-desc');

            titleEl.textContent = data.dynasty + ' · ' + (data.reformYear ? data.reformYear + ' ' : '') + data.period;
            descEl.textContent = data.description;

            if (state.dynasty === 'liang') {
                document.getElementById('filter-section').style.display = 'none';
                document.getElementById('liang-sub-tabs-section').style.display = 'block';
                if (state.liangTab === 'ban') {
                    renderLiangBan(container, data);
                } else {
                    renderLiangGeneral(container, data);
                }
            } else {
                document.getElementById('filter-section').style.display = 'block';
                document.getElementById('liang-sub-tabs-section').style.display = 'none';
                renderSongQi(container, data);
            }
        }

        function renderSongQi(container, data) {
            var html = '';
            data.categories.forEach(function(cat) {
                if (state.filter !== 'all' && cat.id !== state.filter) return;

                html += '<div class="category-card" data-category="' + cat.id + '">';
                html += '<div class="category-header">';
                html += '<div><div class="category-name">' + escapeHtml(cat.name) + '</div>';
                html += '<div class="category-desc">' + escapeHtml(cat.desc) + '</div></div>';
                html += '</div>';
                html += '<div class="officials-list">';

                cat.officials.forEach(function(off, idx) {
                    var key = cat.id + '-' + idx;
                    var rankClass = getRankClass(off.rank);
                    var shortDesc = truncate(off.desc, 30);
                    var isSelected = state.selectedItem && state.selectedItem.key === key ? 'selected' : '';

                    html += '<div class="official-item ' + isSelected + '" data-key="' + key + '" data-cat="' + cat.id + '" data-idx="' + idx + '">';
                    html += '<div class="official-rank-tag ' + rankClass + '">' + escapeHtml(off.rank) + '</div>';
                    html += '<div class="official-info">';
                    html += '<div class="official-name">' + escapeHtml(off.name);
                    if (state.hintEnabled) {
                        html += '<span class="hint-icon" data-tip="' + escapeHtml(truncate(off.desc, 40)) + '">?</span>';
                    }
                    html += '</div>';
                    html += '<div class="official-desc-short">' + escapeHtml(shortDesc) + '</div>';
                    html += '</div></div>';
                });

                html += '</div></div>';
            });

            container.innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">无</div>该类别下无官职数据</div>';

            bindTooltipEvents();

                html += '</div>';
                html += '<div class="ban-desc">' + escapeHtml(row.desc) + '</div>';

            html += '</div>';
            container.innerHTML = html;
            bindBanClicks();
            bindTooltipEvents();

                }
                html += '</td>';
                html += '<td class="col-desc">' + escapeHtml(row.desc || '-') + '</td>';
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
            bindGeneralClicks();
            bindTooltipEvents();
        }

        // ===== 详情面板 =====
        function renderDetail(item, type) {
            var body = document.getElementById('detail-body');
            var title = document.getElementById('detail-title');
            var subtitle = document.getElementById('detail-subtitle');

            if (!item) {
                title.textContent = '详情';
                subtitle.textContent = '点击左侧官职查看详情';
                body.innerHTML = '<div class="empty-state"><div class="empty-state-icon" style="font-size:48px;">&#128214;</div><div>请从左侧选择一个官职或班品<br>查看详细信息</div></div>';
                return;
            }

            var html = '';

            if (type === 'official') {
                title.textContent = item.name;
                subtitle.textContent = '南朝' + (state.dynasty === 'song' ? '宋' : state.dynasty === 'qi' ? '齐' : '梁') + '官职';

                html += '<div class="detail-tag tag-rank">' + (item.rank && item.rank !== '-' ? item.rank : '品级未详') + '</div>';
                if (item.isLocal) {
                    html += '<div class="detail-tag tag-local">&#127758; 地方官专属 · ' + item.localLevel + '</div>';
                }

                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">职责描述</div>';
                html += '<div class="detail-text">' + escapeHtml(item.desc) + '</div>';
                html += '</div>';

                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">史料出处</div>';
                html += '<div class="detail-text"><span class="detail-tag tag-source">《隋书·百官志》</span></div>';
                html += '</div>';

                if (item.note) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title">备注</div>';
                    html += '<div class="detail-text"><span class="detail-tag tag-note">' + escapeHtml(item.note) + '</span></div>';
                    html += '</div>';
                }

                if (item.isLocal) {
                    html += '<div class="local-section">';
                    html += '<div class="local-section-title">&#127758; 地方官专属</div>';
                    html += '<div class="detail-text" style="font-size:12px;color:var(--text-secondary);">该官职为地方官，拥有特定管辖范围与治理权限。</div>';
                    html += '<button class="unlock-btn" id="unlock-btn">&#128274; 解锁地方治理面板</button>';
                    html += '<div class="unlock-content" id="unlock-content">';
                    var local = LOCAL_DETAILS[item.localLevel];
                    if (local) {
                        html += '<div class="local-detail-item"><div class="local-detail-label">管辖范围</div><div class="local-detail-text">' + escapeHtml(local.jurisdiction) + '</div></div>';
                        html += '<div class="local-detail-item"><div class="local-detail-label">主要职责</div><div class="local-detail-text">' + escapeHtml(local.duties) + '</div></div>';
                        html += '<div class="local-detail-item"><div class="local-detail-label">权力范围</div><div class="local-detail-text">' + escapeHtml(local.powers) + '</div></div>';
                        html += '<div class="local-detail-item"><div class="local-detail-label">典型实例</div><div class="local-detail-text">' + escapeHtml(local.examples) + '</div></div>';
                    }
                    html += '</div></div>';
                }
            } else if (type === 'ban') {
                title.textContent = item.ban + '班';
                subtitle.textContent = '梁天监十八班制';

                html += '<div class="detail-tag tag-rank">第' + item.ban + '班</div>';
                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">包含官职</div>';
                html += '<div class="detail-text">' + escapeHtml(item.officials) + '</div>';
                html += '</div>';
                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">等级说明</div>';
                html += '<div class="detail-text">' + escapeHtml(item.desc) + '</div>';
                html += '</div>';
                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">史料出处</div>';
                html += '<div class="detail-text"><span class="detail-tag tag-source">《隋书·百官志》</span></div>';
                html += '</div>';
            } else if (type === 'general') {
                title.textContent = '将军号 · ' + item.class + '班';
                subtitle.textContent = '梁天监将军号十品二十四班';

                html += '<div class="detail-tag tag-rank">' + item.grade + ' · ' + item.class + '班</div>';
                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">将军名号</div>';
                html += '<div class="detail-text">' + escapeHtml(item.names) + '</div>';
                html += '</div>';
                if (item.desc) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title">说明</div>';
                    html += '<div class="detail-text">' + escapeHtml(item.desc) + '</div>';
                    html += '</div>';
                }
                html += '<div class="detail-section">';
                html += '<div class="detail-section-title">史料出处</div>';
                html += '<div class="detail-text"><span class="detail-tag tag-source">《隋书·百官志》</span></div>';
                html += '</div>';
            }

            body.innerHTML = html;

            // 绑定解锁按钮
            var unlockBtn = document.getElementById('unlock-btn');
            if (unlockBtn) {
                unlockBtn.addEventListener('click', function() {
                    var content = document.getElementById('unlock-content');
                    content.classList.toggle('open');
                    this.innerHTML = content.classList.contains('open') ? '&#128275; 已解锁地方治理面板' : '&#128274; 解锁地方治理面板';
                });
            }
        }

        // ===== 事件绑定 =====
        function bindOfficialClicks() {
            document.querySelectorAll('.official-item').forEach(function(el) {
                el.addEventListener('click', function() {
                    var catId = this.dataset.cat;
                    var idx = parseInt(this.dataset.idx);
                    var data = DYNASTY_MAP[state.dynasty];
                    var cat = data.categories.find(function(c) { return c.id === catId; });
                    if (!cat) return;
                    var official = cat.officials[idx];
                    state.selectedItem = { key: this.dataset.key, data: official, type: 'official' };
                    renderDisplay();
                    renderDetail(official, 'official');
                });
            });
        }

        function bindBanClicks() {
            document.querySelectorAll('.ban-row').forEach(function(el) {
                el.addEventListener('click', function() {
                    var ban = parseInt(this.dataset.ban);
                    var data = LIANG_DATA.banSystem.find(function(b) { return b.ban === ban; });
                    if (!data) return;
                    state.selectedItem = { ban: ban, data: data, type: 'ban' };
                    renderDisplay();
                    renderDetail(data, 'ban');
                });
            });
        }

        function bindGeneralClicks() {
            document.querySelectorAll('.general-table tbody tr').forEach(function(el) {
                el.addEventListener('click', function() {
                    var classNum = parseInt(this.dataset.class);
                    var data = LIANG_DATA.generalRanks.find(function(r) { return r.class === classNum; });
                    if (!data) return;
                    state.selectedItem = { classNum: classNum, data: data, type: 'general' };
                    renderDisplay();
                    renderDetail(data, 'general');
                });
            });
        }

        function bindTooltipEvents() {
            var tooltip = document.getElementById('tooltip');
            document.querySelectorAll('.hint-icon').forEach(function(el) {
                el.addEventListener('mouseenter', function(e) {
                    tooltip.textContent = this.dataset.tip;
                    tooltip.classList.add('show');
                    updateTooltipPos(e);
                });
                el.addEventListener('mousemove', updateTooltipPos);
                el.addEventListener('mouseleave', function() {
                    tooltip.classList.remove('show');
                });
            });
        }

        function updateTooltipPos(e) {
            var tooltip = document.getElementById('tooltip');
            var x = e.clientX + 12;
            var y = e.clientY + 12;
            if (x + tooltip.offsetWidth > window.innerWidth) x = e.clientX - tooltip.offsetWidth - 8;
            if (y + tooltip.offsetHeight > window.innerHeight) y = e.clientY - tooltip.offsetHeight - 8;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        // ===== 控制面板事件 =====
        document.querySelectorAll('.dynasty-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.dynasty-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                state.dynasty = this.dataset.dynasty;
                state.selectedItem = null;
                renderDetail(null);
                renderDisplay();
            });
        });

        document.querySelectorAll('.filter-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
                this.classList.add('active');
                state.filter = this.dataset.filter;
                state.selectedItem = null;
                renderDisplay();
            });
        });

        document.querySelectorAll('.liang-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.liang-tab').forEach(function(t) { t.classList.remove('active'); });
                this.classList.add('active');
                state.liangTab = this.dataset.liangTab;
                state.selectedItem = null;
                renderDetail(null);
                renderDisplay();
            });
        });

        document.getElementById('hint-toggle').addEventListener('click', function() {
            this.classList.toggle('on');
            state.hintEnabled = this.classList.contains('on');
            renderDisplay();
        });

        // ===== 初始化 =====
        renderDetail(null);
        renderDisplay();
    </script>
</body>
</html>
