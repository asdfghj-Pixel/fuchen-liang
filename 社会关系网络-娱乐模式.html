<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南朝浮生录 - 社会关系网络 · 生活娱乐模式</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","SimSun",serif;background:#1a0f0a;color:#e8d5b7;overflow:auto;height:auto}
.container{display:flex;height:100vh}
.sidebar{width:320px;background:#2d1810;border-right:2px solid #5c3317;padding:0;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px;border-bottom:1px solid #5c3317;background:rgba(139,69,19,.1)}
.sidebar-header h1{color:#d4a853;font-size:1.1em;letter-spacing:2px}
.sidebar-header .subtitle{color:#8b6914;font-size:.8em;margin-top:4px}
/* 身份选择面板 */
.identity-panel{padding:12px 16px;border-bottom:1px solid #5c3317;background:rgba(139,69,19,.08)}
.identity-label{font-size:.75em;color:#b8956a;margin-bottom:8px;letter-spacing:1px}
.identity-buttons{display:flex;flex-wrap:wrap;gap:6px}
.identity-btn{flex:1 1 calc(50% - 3px);min-width:120px;padding:8px 6px;border:1px solid #5c3317;background:rgba(26,15,10,.6);color:#e8d5b7;font-family:inherit;font-size:.78em;cursor:pointer;border-radius:6px;transition:all .2s;text-align:center;line-height:1.4}
.identity-btn:hover{background:rgba(139,69,19,.3);border-color:#8b4513}
.identity-btn.active{border-color:#d4a853;background:rgba(212,168,83,.12)}
.identity-btn .id-name{display:block;font-weight:bold;color:#e8d5b7;margin-bottom:3px}
.identity-btn .id-rank{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.68em}
.rank-free{background:rgba(60,180,120,.2);color:#69f0ae;border:1px solid #3cb478}
.rank-half{background:rgba(220,180,60,.2);color:#ffd54f;border:1px solid #dcb43c}
.rank-unfree{background:rgba(180,60,60,.2);color:#ff8a80;border:1px solid #b43c3c}
.rank-official{background:rgba(80,130,220,.2);color:#82b1ff;border:1px solid #5082dc}
/* 情境面板 */
.context-panel{padding:15px 20px;border-bottom:1px solid #5c3317}
.context-label{font-size:.8em;color:#b8956a;margin-bottom:8px;letter-spacing:1px}
.context-info{padding:12px 14px;border:1px solid #5c3317;background:rgba(139,69,19,.15);border-radius:6px}
.context-time{color:#d4a853;font-size:1em;font-weight:bold;margin-bottom:4px}
.context-place{color:#b8956a;font-size:.82em;line-height:1.6}
.context-phase-tag{display:inline-block;padding:2px 8px;background:rgba(212,168,83,.15);color:#d4a853;border:1px solid #d4a853;border-radius:4px;font-size:.72em;margin-top:6px}
.timeline-panel{flex:1;overflow-y:auto;padding:15px 20px}
.timeline-title{font-size:.85em;color:#d4a853;margin-bottom:12px;letter-spacing:1px}
.timeline-event{padding:10px 12px;margin-bottom:8px;background:rgba(26,15,10,.5);border:1px solid #3d1f0f;border-radius:8px;cursor:pointer;transition:all .2s;font-size:.82em}
.timeline-event:hover{border-color:#8b4513;background:rgba(139,69,19,.1)}
.timeline-event.active{border-color:#d4a853;background:rgba(212,168,83,.08)}
.timeline-event .phase{color:#d4a853;font-weight:bold;font-size:.85em}
.timeline-event .desc{color:#b8956a;margin-top:3px;font-size:.78em}
.timeline-event .new-tag{display:inline-block;padding:1px 6px;background:rgba(60,180,120,.2);color:#69f0ae;border:1px solid #3cb478;border-radius:4px;font-size:.7em;margin-left:6px}
.detail-panel{padding:15px 20px;border-top:1px solid #5c3317;max-height:280px;overflow-y:auto}
.detail-panel h3{color:#d4a853;font-size:.9em;margin-bottom:10px}
.relation-list{list-style:none}
.relation-list li{padding:6px 0;border-bottom:1px dashed #3d1f0f;font-size:.8em;display:flex;justify-content:space-between;align-items:center}
.relation-list li:last-child{border-bottom:none}
.relation-list .rel-name{color:#e8d5b7}
.relation-list .rel-type{font-size:.7em;padding:1px 6px;border-radius:4px}
.rel-blood{background:rgba(220,80,60,.2);color:#ff8a80;border:1px solid #dc5040}
.rel-teacher{background:rgba(80,130,220,.2);color:#82b1ff;border:1px solid #5082dc}
.rel-business{background:rgba(60,180,120,.2);color:#69f0ae;border:1px solid #3cb478}
.rel-hometown{background:rgba(220,180,60,.2);color:#ffd54f;border:1px solid #dcb43c}
.rel-patron{background:rgba(160,80,180,.2);color:#ea80fc;border:1px solid #a050b4}
.rel-enemy{background:rgba(180,60,60,.2);color:#ff8a80;border:1px solid #b43c3c}
.canvas-area{flex:1;position:relative;background:#1a0f0a}
#networkCanvas{display:block;width:100%;height:100%;cursor:grab}
#networkCanvas:active{cursor:grabbing}
.controls{position:absolute;top:15px;right:15px;display:flex;gap:8px;z-index:10}
.control-btn{padding:8px 14px;border:1px solid #5c3317;background:rgba(26,15,10,.9);color:#d4a853;font-family:inherit;font-size:.8em;cursor:pointer;border-radius:6px;transition:all .2s}
.control-btn:hover{background:rgba(139,69,19,.4);border-color:#8b4513}
.node-info{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(26,15,10,.95);border:1px solid #5c3317;border-radius:12px;padding:16px 20px;z-index:10;max-width:500px;display:none;backdrop-filter:blur(10px)}
.node-info.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.node-info h3{color:#d4a853;font-size:1em;margin-bottom:8px}
.node-info p{font-size:.82em;line-height:1.7;color:#e8d5b7}
.node-info .tag-row{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.node-info .tag{padding:3px 10px;border-radius:12px;font-size:.72em}
.node-info .quote{font-style:italic;color:#d4a853;border-left:3px solid #8b4513;padding-left:10px;margin:10px 0;font-size:.8em}
.legend{position:absolute;top:60px;right:15px;background:rgba(26,15,10,.95);border:1px solid #5c3317;border-radius:8px;padding:12px 14px;z-index:10}
.legend-title{font-size:.75em;color:#d4a853;margin-bottom:6px;letter-spacing:1px}
.legend-item{display:flex;align-items:center;margin:4px 0;font-size:.72em;color:#b8956a}
.legend-dot{width:10px;height:10px;border-radius:50%;margin-right:7px}
.stats-bar{position:absolute;top:15px;left:20px;display:flex;gap:12px;z-index:10}
.stat-item{padding:8px 14px;background:rgba(26,15,10,.9);border:1px solid #5c3317;border-radius:8px;text-align:center}
.stat-item .num{color:#d4a853;font-size:1.2em;font-weight:bold}
.stat-item .label{font-size:.7em;color:#8b6914;margin-top:2px}
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(139,69,19,.95);border:1px solid #d4a853;padding:12px 24px;border-radius:8px;z-index:20;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
.toast.show{opacity:1}
.toast h4{color:#d4a853;font-size:.9em;margin-bottom:4px}
.toast p{font-size:.82em;color:#e8d5b7}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="sidebar-header">
<h1>社会关系网络 · 生活娱乐模式</h1>
<div class="subtitle" id="sidebarSubtitle">以建康城郊农民视角展开</div>
</div>
<div class="identity-panel">
<div class="identity-label">选择身份</div>
<div class="identity-buttons" id="identityButtons"></div>
</div>
<div class="context-panel">
<div class="context-label">当前情境</div>
<div class="context-info">
<div class="context-time" id="contextTime">天监三年 · 春耕前</div>
<div class="context-place" id="contextPlace">秣陵县东郊，你家三十亩薄田旁。冬麦已种，春耕将至，日子虽清贫但安稳。</div>
<div class="context-phase-tag" id="contextTag">初始</div>
</div>
</div>
<div class="timeline-panel">
<div class="timeline-title">时间线推进</div>
<div id="timelineList"></div>
</div>
<div class="detail-panel" id="detailPanel" style="display:none">
<h3>人物关系</h3>
<ul class="relation-list" id="relationList"></ul>
</div>
</div>
<div class="canvas-area" id="canvasArea">
<div class="stats-bar">
<div class="stat-item"><div class="num" id="statNodes">0</div><div class="label">关系节点</div></div>
<div class="stat-item"><div class="num" id="statEdges">0</div><div class="label">关系连接</div></div>
<div class="stat-item"><div class="num" id="statPhase">0</div><div class="label">已推进阶段</div></div>
</div>
<div class="controls">
<button class="control-btn" onclick="resetNetwork()">重置</button>
<button class="control-btn" onclick="advanceTimeline()" style="background:linear-gradient(135deg,#8b4513,#a0522d);color:#fff;border:none">推进时间线</button>
</div>
<canvas id="networkCanvas"></canvas>
<div class="legend" id="legend"></div>
<div class="node-info" id="nodeInfo">
<h3 id="infoName"></h3>
<p id="infoDesc"></p>
<div class="quote" id="infoQuote"></div>
<div class="tag-row" id="infoTags"></div>
</div>
<div class="toast" id="toast">
<h4 id="toastTitle">新关系建立</h4>
<p id="toastContent">内容</p>
</div>
</div>
</div>

    var area = document.getElementById('canvasArea');
    cW = area.clientWidth || (window.innerWidth - 320);
    cH = area.clientHeight || window.innerHeight;
    if (cW < 200) cW = window.innerWidth - 320;
    if (cH < 200) cH = window.innerHeight;
    canvas.width = cW * dpr; canvas.height = cH * dpr;
    canvas.style.width = cW + 'px'; canvas.style.height = cH + 'px';
}
resizeCanvas();

var IDENTITY_LIST = [
    {id:'zigenong', name:'自耕农', rank:'自由民', cls:'rank-free'},
    {id:'dianhu', name:'佃户', rank:'半自由', cls:'rank-half'},
    {id:'nuli', name:'奴隶', rank:'不自由', cls:'rank-unfree'},
    {id:'binghu', name:'兵户', rank:'官户', cls:'rank-official'},
    {id:'lihu', name:'吏户', rank:'官户', cls:'rank-official'}
];

function buildIdentityButtons() {
    var container = document.getElementById('identityButtons');
    var html = '';
    for (var i = 0; i < IDENTITY_LIST.length; i++) {
        var item = IDENTITY_LIST[i];
        var active = item.id === currentIdentity ? ' active' : '';
        html += '<button class="identity-btn' + active + '" data-id="' + item.id + '" onclick="switchIdentity(\'' + item.id + '\')">' +
            '<span class="id-name">' + item.name + '</span>' +
            '<span class="id-rank ' + item.cls + '">' + item.rank + '</span></button>';
    }
    container.innerHTML = html;
}

function switchIdentity(id) {
    if (!ALL_DATA[id]) return;
    currentIdentity = id;
    // 更新按钮状态
    var btns = document.querySelectorAll('.identity-btn');
    for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].getAttribute('data-id') === id);
    }
    resetNetwork();
}

function getCurrentData() {
    return ALL_DATA[currentIdentity];
}

// ========== 情境面板更新 ==========
function updateContext() {
    var timeEl = document.getElementById('contextTime');
    var placeEl = document.getElementById('contextPlace');
    var tagEl = document.getElementById('contextTag');
    var data = getCurrentData();
    if (currentPhase < 0) {
        timeEl.textContent = data.contextDefault.time;
        placeEl.textContent = data.contextDefault.place;
        tagEl.textContent = data.contextDefault.tag;
    } else {
        var evt = data.timeline[currentPhase];
        timeEl.textContent = evt.contextTime;
        placeEl.textContent = evt.contextPlace;
        tagEl.textContent = evt.phase;
    }
    document.getElementById('sidebarSubtitle').textContent = data.subtitle;
}

// ========== 网络初始化 ==========
function initNetwork() {
    var data = getCurrentData();
    nodes = [];
    for (var i = 0; i < data.initialNodes.length; i++) {
        var n = data.initialNodes[i];
        nodes.push({
            id: n.id, name: n.name, type: n.type, desc: n.desc, quote: n.quote, source: n.source, thought: n.thought,
            x: cW/2 + n.x + (Math.random()-.5)*20, y: cH/2 + n.y + (Math.random()-.5)*20,
            r: n.r, vx: 0, vy: 0
        });
    }
    edges = [];
    for (var i = 0; i < data.initialEdges.length; i++) {
        var e = data.initialEdges[i];
        edges.push({from: e.from, to: e.to, type: e.type, strength: e.strength});
    }
    scale = 1; panX = 0; panY = 0;
    stabilize();
}

function updateStats() {
    document.getElementById('statNodes').textContent = nodes.length - 1;
    document.getElementById('statEdges').textContent = edges.length;
    document.getElementById('statPhase').textContent = currentPhase + 1;
}

function updateTimelineUI() {
    var data = getCurrentData();
    var html = '';
    for (var i = 0; i < data.timeline.length; i++) {
        var evt = data.timeline[i];
        var cls = i <= currentPhase ? 'active' : '';
        var tag = i === currentPhase ? '<span class="new-tag">当前</span>' : '';
        html += '<div class="timeline-event ' + cls + '" onclick="jumpToPhase(' + i + ')">' +
            '<span class="phase">' + evt.phase + '</span>' + tag +
            '<div class="desc">' + evt.toast.content + '</div></div>';
    }
    document.getElementById('timelineList').innerHTML = html;
}

function jumpToPhase(target) {
    var data = getCurrentData();
    initNetwork();
    currentPhase = -1;
    for (var i = 0; i <= target && i < data.timeline.length; i++) {
        currentPhase = i;
        var evt = data.timeline[i];
        for (var j = 0; j < evt.nodes.length; j++) {
            var nn = evt.nodes[j];
            if (!nodes.find(function(n){return n.id===nn.id;})) {
                nodes.push({
                    id: nn.id, name: nn.name, type: nn.type, desc: nn.desc, quote: nn.quote, source: nn.source,
                    x: cW/2 + nn.x + (Math.random()-.5)*30, y: cH/2 + nn.y + (Math.random()-.5)*30,
                    r: nn.r, vx: 0, vy: 0, thought: nn.thought
                });
            }
        }
        for (var j = 0; j < evt.edges.length; j++) {
            var ne = evt.edges[j];
            if (!edges.find(function(e){return e.from===ne.from&&e.to===ne.to;})) {
                edges.push({from: ne.from, to: ne.to, type: ne.type, strength: ne.strength});
            }
        }
    }
    stabilize();
    updateStats(); updateTimelineUI(); updateContext();
}

function updateLegend() {
    var legend = document.getElementById('legend');
    legend.innerHTML = '<div class="legend-title">关系类型</div>' +
        '<div class="legend-item"><div class="legend-dot" style="background:#dc5040"></div><span>血缘宗族</span></div>' +
        '<div class="legend-item"><div class="legend-dot" style="background:#5082dc"></div><span>师徒技艺</span></div>' +
        '<div class="legend-item"><div class="legend-dot" style="background:#3cb478"></div><span>商业往来</span></div>' +
        '<div class="legend-item"><div class="legend-dot" style="background:#dcb43c"></div><span>邻里乡党</span></div>' +
        '<div class="legend-item"><div class="legend-dot" style="background:#a050b4"></div><span>官民吏治</span></div>' +
        '<div class="legend-item"><div class="legend-dot" style="background:#b43c3c"></div><span>冲突对抗</span></div>';
}

// ========== 物理引擎 ==========
function physicsStep() {
    var repulse = 5000, spring = 0.012, damp = 0.88;
    for (var i = 0; i < nodes.length; i++) {
        for (var j = i + 1; j < nodes.length; j++) {
            var dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
            var dist = Math.sqrt(dx*dx + dy*dy) || 1;
            var f = repulse / (dist * dist);
            var fx = (dx/dist) * f, fy = (dy/dist) * f;
            nodes[i].vx -= fx; nodes[i].vy -= fy;
            nodes[j].vx += fx; nodes[j].vy += fy;
        }
    }
    for (var ei = 0; ei < edges.length; ei++) {
        var e = edges[ei];
        var n1 = nodes.find(function(n){return n.id===e.from;});
        var n2 = nodes.find(function(n){return n.id===e.to;});
        if (!n1 || !n2) continue;
        var dx = n2.x - n1.x, dy = n2.y - n1.y;
        var dist = Math.sqrt(dx*dx + dy*dy) || 1;
        var target = 90 + Math.abs(e.strength) * 8;
        var f = (dist - target) * spring;
        var fx = (dx/dist) * f, fy = (dy/dist) * f;
        n1.vx += fx; n1.vy += fy; n2.vx -= fx; n2.vy -= fy;
    }
    for (var ni = 0; ni < nodes.length; ni++) {
        var n = nodes[ni];
        n.vx += (cW/2 - n.x) * 0.002;
        n.vy += (cH/2 - n.y) * 0.002;
        n.vx *= damp; n.vy *= damp;
        if (n !== dragNode) { n.x += n.vx; n.y += n.vy; }
        var m = 50;
        n.x = Math.max(m, Math.min(cW - m, n.x));
        n.y = Math.max(m, Math.min(cH - m, n.y));
    }
}

function stabilize() {
    for (var i = 0; i < 80; i++) physicsStep();
}

// ========== 渲染 ==========
function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cW, cH);
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(scale, scale);

    // 边
    for (var ei = 0; ei < edges.length; ei++) {
        var e = edges[ei];
        var n1 = nodes.find(function(n){return n.id===e.from;});
        var n2 = nodes.find(function(n){return n.id===e.to;});
        if (!n1 || !n2) continue;
        ctx.beginPath(); ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y);
        if (e.strength < 0) {
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = 'rgba(180,60,60,.35)';
        } else {
            ctx.setLineDash([]);
            ctx.strokeStyle = (REL_COLORS[e.type] || '#888') + '45';
        }
        ctx.lineWidth = Math.max(1, Math.abs(e.strength) * 0.5);
        ctx.stroke(); ctx.setLineDash([]);
    }

    // 节点
    for (var ni = 0; ni < nodes.length; ni++) {
        var n = nodes[ni];
        var tc = n.type === 'player' ? '#d4a853' : (REL_COLORS[n.type] || '#888');
        if (n === selectedNode || n === hoveredNode) {
            ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 8, 0, Math.PI*2);
            ctx.strokeStyle = '#d4a853'; ctx.lineWidth = 2.5; ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
        ctx.fillStyle = tc; ctx.fill();
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
        ctx.strokeStyle = n.type==='player'?'#d4a853':'rgba(255,255,255,.3)';
        ctx.lineWidth = n.type==='player'?3:2; ctx.stroke();
        if (n.type === 'player') {
            ctx.beginPath(); ctx.arc(n.x, n.y, n.r - 6, 0, Math.PI*2);
            ctx.strokeStyle = '#d4a85380'; ctx.lineWidth = 1; ctx.stroke();
        }
        ctx.fillStyle = '#e8d5b7'; ctx.font = (n.type==='player'?'bold ':'') + '12px serif'; ctx.textAlign = 'center';
        ctx.fillText(n.name, n.x, n.y + n.r + 17);
        if (n.type !== 'player') {
            ctx.fillStyle = tc + 'cc'; ctx.font = '9px serif';
            ctx.fillText(REL_LABELS[n.type] || '', n.x, n.y + n.r + 30);
        }
    }
    ctx.restore();
}

function animate() {
    physicsStep(); render();
    requestAnimationFrame(animate);
}

// ========== 交互 ==========
function getNodeAt(x, y) {
    var mx = (x - panX) / scale, my = (y - panY) / scale;
    for (var i = nodes.length - 1; i >= 0; i--) {
        var dx = mx - nodes[i].x, dy = my - nodes[i].y;
        if (Math.sqrt(dx*dx + dy*dy) <= nodes[i].r + 5) return nodes[i];
    }
    return null;
}

canvas.addEventListener('mousedown', function(e) {
    var rect = canvas.getBoundingClientRect();
    lastMX = e.clientX - rect.left; lastMY = e.clientY - rect.top;
    var node = getNodeAt(lastMX, lastMY);
    if (node) { dragNode = node; selectedNode = node; showNodeInfo(node); }
    else { isDragging = true; }
});
canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left, y = e.clientY - rect.top;
    if (dragNode) {
        dragNode.x = (x - panX) / scale; dragNode.y = (y - panY) / scale;
        dragNode.vx = 0; dragNode.vy = 0;
    } else if (isDragging) {
        panX += x - lastMX; panY += y - lastMY;
        lastMX = x; lastMY = y;
    } else {
        hoveredNode = getNodeAt(x, y);
        canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
    }
});
canvas.addEventListener('mouseup', function() { isDragging = false; dragNode = null; });
canvas.addEventListener('mouseleave', function() { isDragging = false; dragNode = null; });
canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left, y = e.clientY - rect.top;
    var factor = e.deltaY < 0 ? 1.12 : 0.88;
    var ns = Math.max(0.4, Math.min(3, scale * factor));
    panX = x - (x - panX) * (ns / scale); panY = y - (y - panY) * (ns / scale);
    scale = ns;
}, {passive:false});

function showNodeInfo(node) {
    var info = document.getElementById('nodeInfo');
    info.classList.add('show');
    document.getElementById('infoName').textContent = node.name;
    document.getElementById('infoDesc').textContent = node.desc;
    var quote = document.getElementById('infoQuote');
    if (node.quote) { quote.style.display = 'block'; quote.textContent = '"' + node.quote + '" —— ' + (node.source || ''); }
    else { quote.style.display = 'none'; }
    var tagRow = document.getElementById('infoTags');
    if (node.type === 'player') {
        tagRow.innerHTML = '<span class="tag" style="background:rgba(212,168,83,.2);color:#d4a853;border:1px solid #d4a853">主角</span>' +
            '<span class="tag" style="background:rgba(139,69,19,.2);color:#b8956a;border:1px solid #5c3317">' + (node.thought || '') + '</span>';
    } else {
        var tc = REL_COLORS[node.type] || '#888';
        tagRow.innerHTML = '<span class="tag" style="background:' + tc + '20;color:' + tc + ';border:1px solid ' + tc + '">' + (REL_LABELS[node.type] || node.type) + '</span>';
    }

    // 更新左侧人物关系面板
    var panel = document.getElementById('detailPanel');
    var list = document.getElementById('relationList');
    var relEdges = edges.filter(function(e){ return e.from === node.id || e.to === node.id; });
    if (relEdges.length > 0) {
        panel.style.display = 'block';
        var html = '';
        for (var i = 0; i < relEdges.length; i++) {
            var re = relEdges[i];
            var otherId = re.from === node.id ? re.to : re.from;
            var otherNode = nodes.find(function(n){return n.id===otherId;});
            if (!otherNode) continue;
            var tc = REL_COLORS[re.type] || '#888';
            var label = REL_LABELS[re.type] || re.type;
            var strengthText = re.strength > 0 ? '亲密' + re.strength : (re.strength < 0 ? '紧张' + Math.abs(re.strength) : '中性');
            html += '<li><span class="rel-name">' + otherNode.name + '</span>' +
                '<span class="rel-type rel-' + re.type + '">' + label + ' · ' + strengthText + '</span></li>';
        }
        list.innerHTML = html;
    } else {
        panel.style.display = 'none';
    }
}

// ========== 时间线推进 ==========
function advanceTimeline() {
    var data = getCurrentData();
    currentPhase++;
    if (currentPhase >= data.timeline.length) {
        showToast('时间线已到达终点', '所有阶段已推进完毕，社会关系网络已完全展开。');
        currentPhase = data.timeline.length - 1; return;
    }
    var evt = data.timeline[currentPhase];
    // 添加新节点
    for (var i = 0; i < evt.nodes.length; i++) {
        var nn = evt.nodes[i];
        if (!nodes.find(function(n){return n.id===nn.id;})) {
            nodes.push({
                id: nn.id, name: nn.name, type: nn.type, desc: nn.desc, quote: nn.quote, source: nn.source,
                x: cW/2 + nn.x + (Math.random()-.5)*30, y: cH/2 + nn.y + (Math.random()-.5)*30,
                r: nn.r, vx: 0, vy: 0, thought: nn.thought
            });
        }
    }
    // 添加新边
    for (var i = 0; i < evt.edges.length; i++) {
        var ne = evt.edges[i];
        if (!edges.find(function(e){return e.from===ne.from&&e.to===ne.to;})) {
            edges.push({from: ne.from, to: ne.to, type: ne.type, strength: ne.strength});
        }
    }
    showToast(evt.toast.title, evt.toast.content);
    updateStats(); updateTimelineUI(); updateContext();
}

function showToast(title, content) {
    var t = document.getElementById('toast');
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastContent').textContent = content;
    t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');}, 3000);
}

function resetNetwork() {
    currentPhase = -1;
    initNetwork();
    updateStats(); updateTimelineUI(); updateContext();
    document.getElementById('nodeInfo').classList.remove('show');
    document.getElementById('detailPanel').style.display = 'none';
}

// ========== 启动 ==========
window.addEventListener('resize', function(){ resizeCanvas(); render(); });
buildIdentityButtons();
initNetwork();
updateStats(); updateTimelineUI(); updateLegend(); updateContext();
setTimeout(function(){ resizeCanvas(); stabilize(); }, 200);
animate();
</script>
