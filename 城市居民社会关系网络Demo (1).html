<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南朝浮生录 - 城市社会关系网络Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","SimSun",serif;background:#1a0f0a;color:#e8d5b7;overflow:auto;height:auto}
.container{display:flex;height:100vh}
.sidebar{width:320px;background:#2d1810;border-right:2px solid #5c3317;padding:0;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px;border-bottom:1px solid #5c3317;background:rgba(139,69,19,.1)}
.sidebar-header h1{color:#d4a853;font-size:1.1em;letter-spacing:2px}
.sidebar-header .subtitle{color:#8b6914;font-size:.8em;margin-top:4px}
.identity-panel{padding:15px 20px;border-bottom:1px solid #5c3317}
.identity-label{font-size:.8em;color:#b8956a;margin-bottom:8px;letter-spacing:1px}
.identity-category{font-size:.72em;color:#8b6914;margin:10px 0 6px;letter-spacing:1px}
.identity-buttons{display:flex;gap:6px;padding:0 0 10px;flex-wrap:wrap}
.identity-btn{flex:1;min-width:70px;padding:8px 4px;border:1px solid #5c3317;background:rgba(26,15,10,.5);color:#b8956a;font-family:inherit;font-size:.72em;cursor:pointer;border-radius:6px;transition:all .25s;text-align:center;line-height:1.3}
.identity-btn:hover{border-color:#8b4513;background:rgba(139,69,19,.15)}
.identity-btn.active{border-color:#d4a853;background:rgba(212,168,83,.1);color:#d4a853;font-weight:bold}
.identity-btn .btn-sub{display:block;font-size:.65em;color:#8b6914;margin-top:2px}
.context-panel{padding:15px 20px;border-bottom:1px solid #5c3317}
.context-label{font-size:.8em;color:#b8956a;margin-bottom:8px;letter-spacing:1px}
.context-info{padding:12px 14px;border:1px solid #5c3317;background:rgba(139,69,19,.15);border-radius:6px}
.context-time{color:#d4a853;font-size:1em;font-weight:bold;margin-bottom:4px}
.context-place{color:#b8956a;font-size:.82em;line-height:1.6}
.context-phase-tag{display:inline-block;padding:2px 8px;background:rgba(212,168,83,.15);color:#d4a853;border:1px solid #d4a853;border-radius:4px;font-size:.72em;margin-top:6px}
.timeline-panel{flex:1;overflow-y:auto;padding:15px 20px}
.timeline-panel::-webkit-scrollbar{width:4px}
.timeline-panel::-webkit-scrollbar-track{background:transparent}
.timeline-panel::-webkit-scrollbar-thumb{background:#5c3317;border-radius:2px}
.timeline-title{font-size:.85em;color:#d4a853;margin-bottom:12px;letter-spacing:1px}
.timeline-event{padding:10px 12px;margin-bottom:8px;background:rgba(26,15,10,.5);border:1px solid #3d1f0f;border-radius:8px;cursor:pointer;transition:all .2s;font-size:.82em}
.timeline-event:hover{border-color:#8b4513;background:rgba(139,69,19,.1)}
.timeline-event.active{border-color:#d4a853;background:rgba(212,168,83,.08)}
.timeline-event .phase{color:#d4a853;font-weight:bold;font-size:.85em}
.timeline-event .desc{color:#b8956a;margin-top:3px;font-size:.78em}
.timeline-event .new-tag{display:inline-block;padding:1px 6px;background:rgba(60,180,120,.2);color:#69f0ae;border:1px solid #3cb478;border-radius:4px;font-size:.7em;margin-left:6px}
.detail-panel{padding:15px 20px;border-top:1px solid #5c3317;max-height:280px;overflow-y:auto}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-track{background:transparent}
.detail-panel::-webkit-scrollbar-thumb{background:#5c3317;border-radius:2px}
.detail-panel h3{color:#d4a853;font-size:.9em;margin-bottom:10px}
.relation-list{list-style:none}
.relation-list li{padding:6px 0;border-bottom:1px dashed #3d1f0f;font-size:.8em;display:flex;justify-content:space-between;align-items:center}
.relation-list li:last-child{border-bottom:none}
.relation-list .rel-name{color:#e8d5b7}
.relation-list .rel-type{font-size:.7em;padding:1px 6px;border-radius:4px}
.rel-blood{background:rgba(220,80,60,.2);color:#ff8a80;border:1px solid #dc5040}
.rel-teacher{background:rgba(80,130,220,.2);color:#82b1ff;border:1px solid #5082dc}
.rel-business{background:rgba(60,180,120,.2);color:#69f0ae;border:1px solid #3cb478}
.rel-hometown{background:rgba(220,180,60,.2);color:#ffd54f;border:1px solid #dcb43c}
.rel-patron{background:rgba(160,80,180,.2);color:#ea80fc;border:1px solid #a050b4}
.rel-enemy{background:rgba(180,60,60,.2);color:#ff8a80;border:1px solid #b43c3c}
.canvas-area{flex:1;position:relative;background:#1a0f0a}
#networkCanvas{display:block;width:100%;height:100%;cursor:grab}
#networkCanvas:active{cursor:grabbing}
.controls{position:absolute;top:15px;right:15px;display:flex;gap:8px;z-index:10}
.control-btn{padding:8px 14px;border:1px solid #5c3317;background:rgba(26,15,10,.9);color:#d4a853;font-family:inherit;font-size:.8em;cursor:pointer;border-radius:6px;transition:all .2s}
.control-btn:hover{background:rgba(139,69,19,.4);border-color:#8b4513}
.node-info{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(26,15,10,.95);border:1px solid #5c3317;border-radius:12px;padding:16px 20px;z-index:10;max-width:500px;display:none;backdrop-filter:blur(10px)}
.node-info.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.node-info h3{color:#d4a853;font-size:1em;margin-bottom:8px}
.node-info p{font-size:.82em;line-height:1.7;color:#e8d5b7}
.node-info .tag-row{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.node-info .tag{padding:3px 10px;border-radius:12px;font-size:.72em}
.node-info .quote{font-style:italic;color:#d4a853;border-left:3px solid #8b4513;padding-left:10px;margin:10px 0;font-size:.8em}
.legend{position:absolute;top:60px;right:15px;background:rgba(26,15,10,.95);border:1px solid #5c3317;border-radius:8px;padding:12px 14px;z-index:10}
.legend-title{font-size:.75em;color:#d4a853;margin-bottom:6px;letter-spacing:1px}
.legend-item{display:flex;align-items:center;margin:4px 0;font-size:.72em;color:#b8956a}
.legend-dot{width:10px;height:10px;border-radius:50%;margin-right:7px}
.stats-bar{position:absolute;top:15px;left:20px;display:flex;gap:12px;z-index:10}
.stat-item{padding:8px 14px;background:rgba(26,15,10,.9);border:1px solid #5c3317;border-radius:8px;text-align:center}
.stat-item .num{color:#d4a853;font-size:1.2em;font-weight:bold}
.stat-item .label{font-size:.7em;color:#8b6914;margin-top:2px}
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(139,69,19,.95);border:1px solid #d4a853;padding:12px 24px;border-radius:8px;z-index:20;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;white-space:nowrap;max-width:90%}
.toast.show{opacity:1}
.toast h4{color:#d4a853;font-size:.9em;margin-bottom:4px}
.toast p{font-size:.82em;color:#e8d5b7}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="sidebar-header">
<h1>城市社会关系网络</h1>
<div class="subtitle">建康城秦淮河畔的烟火人间</div>
</div>
<div class="identity-panel">
<div class="identity-label">选择身份</div>
<div class="identity-category">手工业</div>
<div class="identity-buttons" id="craftButtons"></div>
<div class="identity-category">商人</div>
<div class="identity-buttons" id="merchantButtons"></div>
</div>
<div class="context-panel">
<div class="context-label">当前情境</div>
<div class="context-info">
<div class="context-time" id="contextTime"></div>
<div class="context-place" id="contextPlace"></div>
<div class="context-phase-tag" id="contextTag">初始</div>
</div>
</div>
<div class="timeline-panel">
<div class="timeline-title">时间线推进</div>
<div id="timelineList"></div>
</div>
<div class="detail-panel" id="detailPanel" style="display:none">
<h3>人物关系</h3>
<ul class="relation-list" id="relationList"></ul>
</div>
</div>
<div class="canvas-area" id="canvasArea">
<div class="stats-bar">
<div class="stat-item"><div class="num" id="statNodes">0</div><div class="label">关系节点</div></div>
<div class="stat-item"><div class="num" id="statEdges">0</div><div class="label">关系连接</div></div>
<div class="stat-item"><div class="num" id="statPhase">0</div><div class="label">已推进阶段</div></div>
</div>
<div class="controls">
<button class="control-btn" onclick="resetNetwork()">重置</button>
<button class="control-btn" onclick="advanceTimeline()" style="background:linear-gradient(135deg,#8b4513,#a0522d);color:#fff;border:none">推进时间线</button>
</div>
<canvas id="networkCanvas"></canvas>
<div class="legend" id="legend"></div>
<div class="node-info" id="nodeInfo">
<h3 id="infoName"></h3>
<p id="infoDesc"></p>
<div class="quote" id="infoQuote"></div>
<div class="tag-row" id="infoTags"></div>
</div>
<div class="toast" id="toast">
<h4 id="toastTitle">新关系建立</h4>
<p id="toastContent">内容</p>
</div>
</div>
</div>

<script>
// ========== Canvas初始化 ==========
var canvas = document.getElementById('networkCanvas');
var ctx = canvas.getContext('2d');
var cW = 0, cH = 0, dpr = window.devicePixelRatio || 1;
function resizeCanvas() {
    var area = document.getElementById('canvasArea');
    cW = area.clientWidth || (window.innerWidth - 320);
    cH = area.clientHeight || window.innerHeight;
    if (cW < 200) cW = window.innerWidth - 320;
    if (cH < 200) cH = window.innerHeight;
    canvas.width = cW * dpr; canvas.height = cH * dpr;
    canvas.style.width = cW + 'px'; canvas.style.height = cH + 'px';
}
resizeCanvas();

// ========== 全局状态 ==========
var currentId = 'weaver';
var currentPhase = -1;
var nodes = [], edges = [];
var hoveredNode = null, selectedNode = null;
var isDragging = false, dragNode = null, lastMX = 0, lastMY = 0;
var scale = 1, panX = 0, panY = 0;

// ========== 关系类型颜色 ==========
var REL_COLORS = {
    blood: '#dc5040', teacher: '#5082dc', business: '#3cb478',
    hometown: '#dcb43c', patron: '#a050b4', enemy: '#b43c3c'
};
var REL_LABELS = {
    blood: '血缘', teacher: '师徒', business: '商业',
    hometown: '同乡/地缘', patron: '官民/依附', enemy: '冲突'
};

// ========== 身份配置 ==========
var CRAFT_IDS = ['weaver','metalcaster','shipwright','porcelain','papermaker'];
var MERCHANT_IDS = ['grassmarket','shopkeeper','travelmerchant'];
var ALL_IDS = CRAFT_IDS.concat(MERCHANT_IDS);
var ID_LABELS = {
    weaver:'纺织匠人', metalcaster:'冶铸匠人', shipwright:'造船匠人',
    porcelain:'制瓷匠人', papermaker:'造纸匠人',
    grassmarket:'草市小贩', shopkeeper:'大市坐贾', travelmerchant:'行商'
};
var ID_SUBS = {
    weaver:'秦淮河畔纺织', metalcaster:'城南冶铸作坊', shipwright:'朱雀航船坞',
    porcelain:'越窑青瓷', papermaker:'银光纸作坊',
    grassmarket:'村口摆摊', shopkeeper:'建康大市布商', travelmerchant:'南北互市'

// ================================================================
// =====================  全部身份数据  =========================
// ================================================================

var ALL_DATA = {};

// ==================== 1. 纺织匠人 ====================
ALL_DATA.weaver = {
    contextDefault: {time:'天监年间 · 建康城', place:'秦淮河畔，你的纺织作坊里机杼声声。祖传的手艺养活了一家老小，日子虽然不富裕，但靠着织出来的绢布在建康城也算站住了脚。', tag:'初始'},
    initialNodes: [
        {id:'player',name:'你（纺织匠人）',type:'player',x:0,y:0,r:26,
         desc:'建康城秦淮河畔纺织作坊的主人，祖传手艺。每日天不亮便起，络丝、纺线、织布，一匹上好的绢布要织上三五日。妻子帮忙络丝理线，日子虽辛苦但踏实。',
         quote:'豫章一年蚕四五熟，永嘉一年八熟。',source:'《齐民要术·种桑柘》',tags:['匠心','生计']},
        {id:'wife',name:'妻子',type:'blood',x:-140,y:-90,r:18,
         desc:'同为匠人之女，自幼便习得纺织本领。嫁过来后帮你络丝理线，一双巧手不输于你。最操心的是女儿小兰的前途。',
         quote:'男务耕桑，女勤织纴。',source:'《颜氏家训·治家》',tags:['家眷']},
        {id:'master',name:'师父（退休老匠人）',type:'teacher',x:130,y:-80,r:18,
         desc:'退休的老匠人，教会你全套纺织技艺——从选茧缫丝到提花织锦。如今年事已高，偶尔来作坊看看，给你指点一二。',
         quote:'积财千万，不如薄技在身。',source:'《颜氏家训·勉学》',tags:['师恩']},
        {id:'zhangzhishi',name:'行会张执事',type:'business',x:-90,y:110,r:17,
         desc:'纺织行会的执事，掌握行会订单分配。为人精明但不失公道，与各家作坊关系微妙。谁跟他走得近，谁就有更多活儿。',
         quote:'行会者，百工之约也。',source:'',tags:['行会']},
        {id:'fangdong',name:'房东陈大户',type:'patron',x:100,y:100,r:16,
         desc:'建康城的小地主，你租了他的铺面开作坊。租金不低但地段好，秦淮河畔来往客商多，生意还过得去。',

        {phase:'官府大单',contextTime:'天监年间 · 官府大单',

            {from:'player',to:'ciyou',type:'business',strength:4}

// ================================================================
// =====================  力导向物理引擎  ========================
// ================================================================

var REPULSION = 8000;
var ATTRACTION = 0.005;
var DAMPING = 0.85;
var CENTER_GRAVITY = 0.02;
var IDEAL_LENGTH = 180;

function physicsStep() {
    var i, j, n1, n2, dx, dy, dist, force, fx, fy, e, target;
    for (i = 0; i < nodes.length; i++) {
        n1 = nodes[i];
        if (n1 === dragNode) continue;
        for (j = i + 1; j < nodes.length; j++) {
            n2 = nodes[j];
            dx = n2.x - n1.x;
            dy = n2.y - n1.y;
            dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 1) { dist = 1; dx = Math.random() - 0.5; dy = Math.random() - 0.5; }
            force = REPULSION / (dist * dist);
            fx = force * dx / dist;
            fy = force * dy / dist;
            n1.vx = (n1.vx || 0) - fx;
            n1.vy = (n1.vy || 0) - fy;
            n2.vx = (n2.vx || 0) + fx;
            n2.vy = (n2.vy || 0) + fy;
        }
    }
    for (i = 0; i < edges.length; i++) {
        e = edges[i];
        n1 = getNodeById(e.from);
        n2 = getNodeById(e.to);
        if (!n1 || !n2) continue;
        dx = n2.x - n1.x;
        dy = n2.y - n1.y;
        dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) dist = 1;
        var str = e.strength || 5;
        var absStr = Math.abs(str);
        force = ATTRACTION * absStr * (dist - IDEAL_LENGTH);
        fx = force * dx / dist;
        fy = force * dy / dist;
        if (n1 !== dragNode) { n1.vx = (n1.vx || 0) + fx; n1.vy = (n1.vy || 0) + fy; }
        if (n2 !== dragNode) { n2.vx = (n2.vx || 0) - fx; n2.vy = (n2.vy || 0) - fy; }
    }
    for (i = 0; i < nodes.length; i++) {
        target = nodes[i];
        if (target === dragNode) continue;
        target.vx = (target.vx || 0) - CENTER_GRAVITY * target.x;
        target.vy = (target.vy || 0) - CENTER_GRAVITY * target.y;
        target.vx *= DAMPING;
        target.vy *= DAMPING;
        target.x += target.vx;
        target.y += target.vy;
    }
}

function stabilize() {
    for (var i = 0; i < 200; i++) physicsStep();
}

// ================================================================
// ========================  渲染引擎  =============================
// ================================================================

function getNodeById(id) {
    for (var i = 0; i < nodes.length; i++) { if (nodes[i].id === id) return nodes[i]; }
    return null;
}

function render() {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cW, cH);
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(scale, scale);
    var ox = cW / 2 / scale - panX / scale;
    var oy = cH / 2 / scale - panY / scale;
    ctx.translate(ox, oy);

    // 绘制连线
    for (var i = 0; i < edges.length; i++) {
        var e = edges[i];
        var sn = getNodeById(e.from);
        var en = getNodeById(e.to);
        if (!sn || !en) continue;
        var color = REL_COLORS[e.type] || '#555';
        ctx.beginPath();
        ctx.moveTo(sn.x, sn.y);
        ctx.lineTo(en.x, en.y);
        ctx.strokeStyle = color;
        ctx.globalAlpha = (e.strength < 0) ? 0.4 : 0.3;
        ctx.lineWidth = (e.strength < 0) ? 1 : 1.5;
        if (e.strength < 0) ctx.setLineDash([4, 4]);
        else ctx.setLineDash([]);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.globalAlpha = 1;

    // 绘制节点
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var r = n.r || 16;
        var isHovered = (n === hoveredNode);
        var isSelected = (n === selectedNode);
        var isPlayer = (n.type === 'player');

        // 光晕
        if (isPlayer || isHovered || isSelected) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, r + 6, 0, Math.PI * 2);
            ctx.fillStyle = isPlayer ? 'rgba(212,168,83,0.2)' : 'rgba(212,168,83,0.12)';
            ctx.fill();
        }

        // 节点圆
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        var grad = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, 0, n.x, n.y, r);
        if (isPlayer) {
            grad.addColorStop(0, '#f0d080');
            grad.addColorStop(1, '#b8860b');
        } else {
            var baseColor = REL_COLORS[n.type] || '#888';
            grad.addColorStop(0, baseColor);
            grad.addColorStop(1, shadeColor(baseColor, -40));
        }
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = isPlayer ? '#d4a853' : (isHovered || isSelected ? '#fff' : 'rgba(255,255,255,0.15)');
        ctx.lineWidth = isPlayer ? 2 : (isHovered || isSelected ? 1.5 : 0.5);
        ctx.stroke();

        // 文字
        ctx.fillStyle = '#e8d5b7';
        ctx.font = (isPlayer ? 'bold ' : '') + (r > 18 ? '11px' : '10px') + ' "Noto Serif SC", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        var label = n.name;
        if (label.length > 6) label = label.substring(0, 5) + '…';
        ctx.fillText(label, n.x, n.y + r + 12);
    }
    ctx.restore();
    ctx.restore();
}

function shadeColor(color, percent) {
    var num = parseInt(color.replace('#',''), 16);
    var r = Math.min(255, Math.max(0, (num >> 16) + percent));
    var g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
    var b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
    return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}

var animFrame;
function animate() {
    physicsStep();
    render();
    updateStats();
    animFrame = requestAnimationFrame(animate);
}

function updateStats() {
    document.getElementById('statNodes').textContent = nodes.length;
    document.getElementById('statEdges').textContent = edges.length;
    document.getElementById('statPhase').textContent = currentPhase + 1;
}

// ================================================================
// ========================  交互代码  =============================
// ================================================================

function getNodeAt(mx, my) {
    var wx = (mx - panX - cW / 2) / scale;
    var wy = (my - panY - cH / 2) / scale;
    for (var i = nodes.length - 1; i >= 0; i--) {
        var n = nodes[i];
        var dx = n.x - wx, dy = n.y - wy;
        if (dx * dx + dy * dy < (n.r + 4) * (n.r + 4)) return n;
    }
    return null;
}

canvas.addEventListener('mousedown', function(e) {
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var node = getNodeAt(mx, my);
    if (node) {
        isDragging = true;
        dragNode = node;
        dragNode.vx = 0; dragNode.vy = 0;
        lastMX = e.clientX; lastMY = e.clientY;
        canvas.style.cursor = 'grabbing';
    } else {
        selectedNode = null;
        document.getElementById('nodeInfo').classList.remove('show');
        document.getElementById('detailPanel').style.display = 'none';
    }
});

canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    if (isDragging && dragNode) {
        var dx = (e.clientX - lastMX) / scale;
        var dy = (e.clientY - lastMY) / scale;
        dragNode.x += dx;
        dragNode.y += dy;
        dragNode.vx = 0; dragNode.vy = 0;
        lastMX = e.clientX; lastMY = e.clientY;
    } else {
        var node = getNodeAt(mx, my);
        hoveredNode = node;
        canvas.style.cursor = node ? 'pointer' : 'grab';
    }
});

canvas.addEventListener('mouseup', function(e) {
    if (isDragging && dragNode) {
        var rect = canvas.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var my = e.clientY - rect.top;
        var dist = Math.abs(e.clientX - lastMX) + Math.abs(e.clientY - lastMY);
        if (dist < 5) {
            showNodeInfo(dragNode);
        }
        isDragging = false;
        dragNode = null;
        canvas.style.cursor = 'grab';
    }
});

canvas.addEventListener('mouseleave', function() {
    isDragging = false;
    dragNode = null;
    hoveredNode = null;
    canvas.style.cursor = 'grab';
});

canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    var delta = e.deltaY > 0 ? 0.9 : 1.1;
    var newScale = Math.max(0.2, Math.min(3, scale * delta));
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left - cW / 2;
    var my = e.clientY - rect.top - cH / 2;
    panX = mx - (mx - panX) * (newScale / scale);
    panY = my - (my - panY) * (newScale / scale);
    scale = newScale;
}, { passive: false });

// ================================================================
// =======================  信息展示  ==============================
// ================================================================

function showNodeInfo(node) {
    selectedNode = node;
    var infoDiv = document.getElementById('nodeInfo');
    document.getElementById('infoName').textContent = node.name;
    document.getElementById('infoDesc').textContent = node.desc || '';
    var quoteDiv = document.getElementById('infoQuote');
    if (node.quote) {
        quoteDiv.textContent = '"' + node.quote + '"——' + (node.source || '');
        quoteDiv.style.display = 'block';
    } else {
        quoteDiv.style.display = 'none';
    }
    var tagsDiv = document.getElementById('infoTags');
    tagsDiv.innerHTML = '';
    if (node.tags) {
        for (var i = 0; i < node.tags.length; i++) {
            var tag = document.createElement('span');
            tag.className = 'tag';
            tag.textContent = node.tags[i];
            tag.style.cssText = 'background:rgba(212,168,83,.15);color:#d4a853;border:1px solid rgba(212,168,83,.3);';
            tagsDiv.appendChild(tag);
        }
    }
    infoDiv.classList.add('show');

    // 关系列表
    var detailPanel = document.getElementById('detailPanel');
    var list = document.getElementById('relationList');
    list.innerHTML = '';
    var related = getRelatedNodes(node.id);
    if (related.length > 0) {
        detailPanel.style.display = 'block';
        detailPanel.querySelector('h3').textContent = node.name + ' 的关系';
        for (var i = 0; i < related.length; i++) {
            var rel = related[i];
            var li = document.createElement('li');
            li.innerHTML = '<span class="rel-name">' + rel.node.name + '</span><span class="rel-type rel-' + rel.edge.type + '">' + REL_LABELS[rel.edge.type] + '</span>';
            list.appendChild(li);
        }
    } else {
        detailPanel.style.display = 'none';
    }
}

function getRelatedNodes(nodeId) {
    var result = [];
    for (var i = 0; i < edges.length; i++) {
        var e = edges[i];
        if (e.from === nodeId) {
            var n = getNodeById(e.to);
            if (n) result.push({ node: n, edge: e });
        } else if (e.to === nodeId) {
            var n = getNodeById(e.from);
            if (n) result.push({ node: n, edge: e });
        }
    }
    return result;
}

function showToast(title, content) {
    var t = document.getElementById('toast');
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastContent').textContent = content;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ================================================================
// =======================  UI 逻辑  ==============================
// ================================================================

function initIdentityButtons() {
    var craftDiv = document.getElementById('craftButtons');
    var merchantDiv = document.getElementById('merchantButtons');
    craftDiv.innerHTML = '';
    merchantDiv.innerHTML = '';
    for (var i = 0; i < CRAFT_IDS.length; i++) {
        var id = CRAFT_IDS[i];
        var btn = document.createElement('button');
        btn.className = 'identity-btn' + (id === currentId ? ' active' : '');
        btn.id = 'btn_' + id;
        btn.innerHTML = ID_LABELS[id] + '<span class="btn-sub">' + ID_SUBS[id] + '</span>';
        btn.onclick = (function(vid) { return function() { switchIdentity(vid); }; })(id);
        craftDiv.appendChild(btn);
    }
    for (var i = 0; i < MERCHANT_IDS.length; i++) {
        var id = MERCHANT_IDS[i];
        var btn = document.createElement('button');
        btn.className = 'identity-btn' + (id === currentId ? ' active' : '');
        btn.id = 'btn_' + id;
        btn.innerHTML = ID_LABELS[id] + '<span class="btn-sub">' + ID_SUBS[id] + '</span>';
        btn.onclick = (function(vid) { return function() { switchIdentity(vid); }; })(id);
        merchantDiv.appendChild(btn);
    }
}

function switchIdentity(id) {
    currentId = id;
    currentPhase = -1;
    // 更新按钮状态
    var allBtns = document.querySelectorAll('.identity-btn');
    for (var i = 0; i < allBtns.length; i++) allBtns[i].classList.remove('active');
    var activeBtn = document.getElementById('btn_' + id);
    if (activeBtn) activeBtn.classList.add('active');
    loadData(id);
}

function loadData(id) {
    var data = ALL_DATA[id];
    if (!data) return;
    nodes = [];
    edges = [];
    for (var i = 0; i < data.initialNodes.length; i++) {
        var n = data.initialNodes[i];
        nodes.push({ id: n.id, name: n.name, type: n.type, x: n.x, y: n.y, r: n.r, vx: 0, vy: 0, desc: n.desc, quote: n.quote, source: n.source, tags: n.tags });
    }
    for (var i = 0; i < data.initialEdges.length; i++) {
        edges.push({ from: data.initialEdges[i].from, to: data.initialEdges[i].to, type: data.initialEdges[i].type, strength: data.initialEdges[i].strength });
    }
    currentPhase = -1;
    document.getElementById('contextTime').textContent = data.contextDefault.time;
    document.getElementById('contextPlace').textContent = data.contextDefault.place;
    document.getElementById('contextTag').textContent = data.contextDefault.tag;
    selectedNode = null;
    hoveredNode = null;
    document.getElementById('nodeInfo').classList.remove('show');
    document.getElementById('detailPanel').style.display = 'none';
    buildTimeline(data);
    scale = 1; panX = 0; panY = 0;
    stabilize();
}

function buildTimeline(data) {
    var list = document.getElementById('timelineList');
    list.innerHTML = '';
    for (var i = 0; i < data.timeline.length; i++) {
        var t = data.timeline[i];
        var div = document.createElement('div');
        div.className = 'timeline-event' + (i <= currentPhase ? ' active' : '');
        var newCount = t.nodes ? t.nodes.length : 0;
        div.innerHTML = '<div class="phase">第' + (i + 1) + '阶段：' + t.phase + '<span class="new-tag">+' + newCount + '人</span></div><div class="desc">' + t.contextPlace.substring(0, 40) + '…</div>';
        div.onclick = (function(idx) { return function() { jumpToPhase(idx); }; })(i);
        list.appendChild(div);
    }
}

function jumpToPhase(targetPhase) {
    var data = ALL_DATA[currentId];
    if (!data) return;
    if (targetPhase >= data.timeline.length) return;
    // 重置到初始状态
    nodes = [];
    edges = [];
    for (var i = 0; i < data.initialNodes.length; i++) {
        var n = data.initialNodes[i];
        nodes.push({ id: n.id, name: n.name, type: n.type, x: n.x, y: n.y, r: n.r, vx: 0, vy: 0, desc: n.desc, quote: n.quote, source: n.source, tags: n.tags });
    }
    for (var i = 0; i < data.initialEdges.length; i++) {
        edges.push({ from: data.initialEdges[i].from, to: data.initialEdges[i].to, type: data.initialEdges[i].type, strength: data.initialEdges[i].strength });
    }
    // 逐阶段添加
    for (var p = 0; p <= targetPhase; p++) {
        var t = data.timeline[p];
        if (t.nodes) {
            for (var j = 0; j < t.nodes.length; j++) {
                var n = t.nodes[j];
                nodes.push({ id: n.id, name: n.name, type: n.type, x: n.x, y: n.y, r: n.r, vx: 0, vy: 0, desc: n.desc, quote: n.quote, source: n.source, tags: n.tags });
            }
        }
        if (t.edges) {
            for (var j = 0; j < t.edges.length; j++) {
                edges.push({ from: t.edges[j].from, to: t.edges[j].to, type: t.edges[j].type, strength: t.edges[j].strength });
            }
        }
    }
    currentPhase = targetPhase;
    var lastT = data.timeline[targetPhase];
    document.getElementById('contextTime').textContent = lastT.contextTime;
    document.getElementById('contextPlace').textContent = lastT.contextPlace;
    document.getElementById('contextTag').textContent = lastT.phase;
    buildTimeline(data);
    selectedNode = null;
    document.getElementById('nodeInfo').classList.remove('show');
    document.getElementById('detailPanel').style.display = 'none';
    scale = 1; panX = 0; panY = 0;
    stabilize();
}

function advanceTimeline() {
    var data = ALL_DATA[currentId];
    if (!data) return;
    var nextPhase = currentPhase + 1;
    if (nextPhase >= data.timeline.length) {
        showToast('已到最后阶段', '无法继续推进。');
        return;
    }
    var t = data.timeline[nextPhase];
    if (t.nodes) {
        for (var j = 0; j < t.nodes.length; j++) {
            var n = t.nodes[j];
            nodes.push({ id: n.id, name: n.name, type: n.type, x: n.x, y: n.y, r: n.r, vx: 0, vy: 0, desc: n.desc, quote: n.quote, source: n.source, tags: n.tags });
        }
    }
    if (t.edges) {
        for (var j = 0; j < t.edges.length; j++) {
            edges.push({ from: t.edges[j].from, to: t.edges[j].to, type: t.edges[j].type, strength: t.edges[j].strength });
        }
    }
    currentPhase = nextPhase;
    document.getElementById('contextTime').textContent = t.contextTime;
    document.getElementById('contextPlace').textContent = t.contextPlace;
    document.getElementById('contextTag').textContent = t.phase;
    buildTimeline(data);
    if (t.toast) showToast(t.toast.title, t.toast.content);
    stabilize();
}

function resetNetwork() {
    loadData(currentId);
    showToast('已重置', '回到初始状态。');
}

function initLegend() {
    var legend = document.getElementById('legend');
    var html = '<div class="legend-title">关系类型</div>';
    for (var key in REL_COLORS) {
        html += '<div class="legend-item"><div class="legend-dot" style="background:' + REL_COLORS[key] + '"></div>' + REL_LABELS[key] + '</div>';
    }
    legend.innerHTML = html;
}

window.addEventListener('resize', function() {
    resizeCanvas();
});

initIdentityButtons();
initLegend();
loadData(currentId);
animate();
